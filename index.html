    <style>

        .login-error{color:#dc2626;font-size:.7rem;margin-top:8px;display:none}
        .nav{background:linear-gradient(135deg,#0b2b3b,#1e5f7a);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100}

        .logo-icon{background:#f59e0b;width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:800}

        .card-title{font-size:.65rem;font-weight:600;text-transform:uppercase;color:#6183a0;margin-bottom:6px}
        .card-value{font-size:1.6rem;font-weight:800;color:#1e5f7a}
        .btn{background:#1e5f7a;border:none;padding:8px 18px;border-radius:25px;color:#fff;font-weight:600;cursor:pointer;font-size:.78rem;display:inline-flex;align-items:center;gap:6px;transition:.3s}.btn:hover{background:#f59e0b}
        .btn-sm{padding:5px 12px;font-size:.7rem}.btn-green{background:#16a34a}.btn-red{background:#dc2626}.btn-orange{background:#f59e0b;color:#000}
        .btn-outline{background:transparent;border:2px solid #1e5f7a;color:#1e5f7a}.btn-outline:hover{background:#1e5f7a;color:#fff}
        .flex-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:16px}
        .tabs{display:inline-flex;gap:0;background:#fff;border-radius:30px;padding:4px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
        .tab-btn{padding:8px 20px;border-radius:25px;border:none;cursor:pointer;font-weight:600;font-size:.78rem;background:transparent;color:#6183a0;transition:.3s}.tab-btn.active{background:#1e5f7a;color:#fff}
        .filter-bar{background:#fff;border-radius:14px;padding:10px 14px;margin-bottom:14px;display:flex;flex-wrap:wrap;gap:8px;border:1px solid #e9edf2;align-items:center}
        .filter-bar input,.filter-bar select{padding:7px 12px;border-radius:20px;border:1px solid #cbd5e1;font-size:.75rem;min-width:110px;font-family:'Inter',sans-serif}
        .item-card{background:#fff;border-radius:14px;padding:16px;border:1px solid #e2edf2;margin-bottom:12px;transition:.3s;cursor:pointer}.item-card:hover{box-shadow:0 4px 15px rgba(0,0,0,.08);border-color:#f59e0b}

        .loc-chip{display:inline-block;padding:4px 10px;border-radius:15px;font-size:.65rem;font-weight:600;margin:2px;cursor:pointer;border:1px solid #e9edf2;transition:.2s}.loc-chip:hover{background:#eef2ff;border-color:#1e5f7a}
        .loc-chip.empty{background:#fee9e7;border-color:#dc2626;color:#dc2626}
        table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;font-size:.75rem}
        th,td{padding:10px;text-align:left;border-bottom:1px solid #eff3f6}th{background:#f8fafd;font-weight:700;color:#2c4b5c;font-size:.68rem;text-transform:uppercase}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);justify-content:center;align-items:center;z-index:1000;backdrop-filter:blur(2px)}
        .modal-box{background:#fff;border-radius:20px;max-width:550px;width:92%;padding:24px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 50px rgba(0,0,0,.3);animation:popIn .3s}

        .modal-box h3{font-size:1.1rem;color:#1e5f7a;margin-bottom:16px}
        .form-group{margin-bottom:14px}.form-group label{font-weight:600;display:block;margin-bottom:4px;font-size:.75rem}
        input,select,textarea{width:100%;padding:9px 12px;border-radius:10px;border:1px solid #cbd5e1;font-size:.8rem;font-family:'Inter',sans-serif}input:focus,select:focus,textarea:focus{outline:none;border-color:#1e5f7a}
        textarea{min-height:55px;resize:vertical}
        .btn-close{position:absolute;top:10px;right:10px;background:none;border:none;font-size:1.1rem;cursor:pointer;color:#6183a0;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center}.btn-close:hover{background:#f0f0f0;color:#dc2626}
        .toast{position:fixed;bottom:25px;right:25px;background:#1e2a3e;color:#fff;padding:10px 22px;border-radius:30px;font-size:.8rem;z-index:2000;animation:slideIn .3s}@keyframes slideIn{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
        .stock-info{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:10px;margin-bottom:12px;font-size:.73rem;color:#166534}
        .stock-info.danger{background:#fef2f2;border-color:#fecaca;color:#dc2626}
        .detail-header{background:#fff;border-radius:16px;padding:20px;margin-bottom:16px;border:1px solid #e9edf2}
        .detail-inner{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:15px}
        .bal-box{background:#eef2ff;padding:12px 20px;border-radius:25px;text-align:center}.bal-label{font-size:.6rem;color:#6183a0;text-transform:uppercase;font-weight:600}.bal-val{font-size:1.2rem;font-weight:800}
        .action-icons i{cursor:pointer;color:#6c8d9c;margin:0 3px;font-size:.75rem}.action-icons i:hover{color:#f59e0b}
        @media(max-width:768px){.nav{flex-direction:column}.nav-link span{display:none}.nav-link{padding:8px 12px}.cards{grid-template-columns:repeat(2,1fr)}}
    </style>
</head>
<body>
<div id="loginScreen">
    <div class="login-box"><div class="login-logo">S</div><h2>SUHA Constructions</h2><p class="login-sub">🔐 Secure Company Access</p>
    <input type="email" id="loginEmail" placeholder="Email" value="suhadesignbuilders@gmail.com">

    <button class="login-btn" onclick="doLogin()">🔐 Sign In</button><p class="login-error" id="loginError"></p></div>

<div id="mainApp" style="display:none">
<div class="nav">

</div>
<div class="main" id="content"><div style="text-align:center;padding:60px;color:#6183a0">Loading...</div></div>
</div>

<script>
const SB_URL='https://nfrhcacqjizdgkimraeq.supabase.co',SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5mcmhjYWNxaml6ZGdraW1yYWVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNzkyNjIsImV4cCI6MjA5Mjk1NTI2Mn0.RY-Zg6uPz82d7d8kKtH-axioVT39-iQj1l_wbGWPKHI';
const sb=supabase.createClient(SB_URL,SB_KEY);
const sitesList=['Hejamadi Godown','Inzam Site','Palm Heights Site','Lakeside Greens','SUHA Corporate Park','Kannangar Site','Padubidri Warehouse'];

let projects=[],vendors=[],transactions=[],invItems=[],invMoves=[];
let currentView='dashboard',siteId=null,vendorId=null,selItem=null,selLoc=null;
let invTab='all',invFilter={keyword:'',location:''};
let txnFilter={startDate:'',endDate:'',projectId:'',vendorId:'',type:'',keyword:''};
let nextPid=1,nextVid=1,nextTid=1,nextIid=1,nextMid=1;

function toast(m){const e=document.createElement('div');e.className='toast';e.textContent=m;document.body.appendChild(e);setTimeout(()=>{e.style.opacity='0';e.style.transition='opacity .3s';setTimeout(()=>e.remove(),300)},2000)}
function fmt(n){return'₹ '+Number(n).toLocaleString('en-IN')}
function fmtNum(n){return Number(n).toLocaleString('en-IN')}
function companyHdr(){return`<div style="text-align:center;margin-bottom:20px;padding-bottom:15px;border-bottom:3px solid #1e5f7a"><h1 style="color:#1e5f7a;font-size:22px;font-weight:800">SUHA Constructions</h1><p style="font-size:12px;color:#555">Builders & Developers</p><p style="font-size:11px;color:#666">Head Office: Pandith Complex, Kannangar, Padubidri - 574111</p><p style="font-size:11px;color:#666">Branch: Whitestone Tower, Balmatta Road, Mangalore - 575001</p><p style="font-size:11px;color:#666">📞 +91 97403 04406 | 📧 suhadesignbuilders@gmail.com</p></div>`}

// AUTH
async function doLogin(){const e=document.getElementById('loginEmail').value.trim(),p=document.getElementById('loginPass').value,er=document.getElementById('loginError');er.style.display='none';if(!e||!p){er.textContent='Enter email and password';er.style.display='block';return}const{data,error}=await sb.auth.signInWithPassword({email:e,password:p});if(error){er.textContent='❌ '+error.message;er.style.display='block'}else{document.getElementById('loginScreen').style.display='none';document.getElementById('mainApp').style.display='block';await loadData();render()}}
async function doLogout(){await sb.auth.signOut();document.getElementById('loginScreen').style.display='flex';document.getElementById('mainApp').style.display='none'}

// LOAD
async function loadData(){
    const[p,v,t,i,m]=await Promise.all([sb.from('projects').select('*').order('name'),sb.from('vendors').select('*').order('name'),sb.from('transactions').select('*').order('date',{ascending:false}),sb.from('inventory_items').select('*').order('name'),sb.from('inventory_movements').select('*').order('date',{ascending:false})]);
    projects=p.data||[];vendors=v.data||[];transactions=t.data||[];invItems=i.data||[];invMoves=m.data||[];
    // Fallback demo data
    if(!projects.length){projects=[{id:'p1',name:'Lakeside Greens',location:'Padubidri',start_date:'2025-01-10'},{id:'p2',name:'Palm Heights',location:'Kannangar',start_date:'2025-03-05'},{id:'p3',name:'SUHA Corporate Park',location:'Mangalore',start_date:'2025-08-20'}];}
    if(!vendors.length){vendors=[{id:'v1',name:'Mahadev Cement Works',phone:'9876543210',service:'Cement Supply'},{id:'v2',name:'Sai Steel Industries',phone:'9988766550',service:'TMT Steel'},{id:'v3',name:'Rockland Earthmovers',phone:'9123456789',service:'Heavy Equipment'}];}
}
function getUniqueItems(){return[...new Set(invItems.map(i=>i.name))]}
function getItemLocs(name){return[...new Set(invItems.filter(i=>i.name===name).map(i=>i.location))]}
function getStockAt(name,loc){const i=invItems.find(x=>x.name===name&&x.location===loc);return i?i.quantity:0}
function getTotalStock(name){return invItems.filter(i=>i.name===name).reduce((s,i)=>s+i.quantity,0)}
function getMovements(name){return invMoves.filter(m=>m.item_name===name).sort((a,b)=>new Date(b.date)-new Date(a.date))}

function getFilteredTxns(){let f=[...transactions];if(txnFilter.startDate)f=f.filter(t=>t.date>=txnFilter.startDate);if(txnFilter.endDate)f=f.filter(t=>t.date<=txnFilter.endDate);if(txnFilter.projectId)f=f.filter(t=>t.project_id===txnFilter.projectId);if(txnFilter.vendorId)f=f.filter(t=>t.vendor_id===txnFilter.vendorId);if(txnFilter.type)f=f.filter(t=>t.type===txnFilter.type);if(txnFilter.keyword){const k=txnFilter.keyword.toLowerCase();f=f.filter(t=>(t.notes&&t.notes.toLowerCase().includes(k))||(projects.find(p=>p.id===t.project_id)?.name?.toLowerCase().includes(k)))}return f}
let st;function handleSearch(v,t){clearTimeout(st);st=setTimeout(()=>{if(t==='inv'){invFilter.keyword=v;render()}else{txnFilter.keyword=v;render()}},300)}

function makeSummary(l){return`<div style="background:#f0f4f9;padding:12px 15px;border-radius:8px;margin:10px 0;border-left:4px solid #1e5f7a">${l.map(x=>`<p style="margin:3px 0;font-size:12px"><strong>${x.label}:</strong> ${x.value}</p>`).join('')}</div>`}
function exportPDF(title,headers,rows,summary,filename){const e=document.createElement('div');e.style.cssText='padding:30px;font-family:Arial;max-width:800px;background:white';let h=companyHdr()+`<h2 style="text-align:center;color:#1e5f7a;font-size:18px">${title}</h2>`;if(summary)h+=summary;h+=`<table style="width:100%;border-collapse:collapse;font-size:11px"><thead><tr style="background:#1e5f7a;color:white">${headers.map(hd=>`<th style="padding:10px 8px">${hd}</th>`).join('')}</tr></thead><tbody>${rows.map((r,i)=>`<tr style="background:${i%2===0?'#fff':'#f8fafd'}">${r.map(c=>`<td style="padding:8px">${c}</td>`).join('')}</tr>`).join('')}</tbody></table>`;e.innerHTML=h;html2pdf().from(e).set({margin:.4,filename:filename||'Report.pdf'}).save();toast('📄 PDF!')}
function exportExcel(title,data,headers,filename){const d=data.map(r=>{const o={};headers.forEach((h,i)=>o[h]=r[i]);return o}),w=XLSX.utils.json_to_sheet(d),b=XLSX.utils.book_new();XLSX.utils.book_append_sheet(b,w,title.substring(0,31));XLSX.writeFile(b,filename||'Report.xlsx');toast('📊 Excel!')}

// MODALS
function showModal(title,content,onSave){const ex=document.querySelector('.modal');if(ex)ex.remove();const m=document.createElement('div');m.className='modal';m.style.display='flex';m.innerHTML=`<div class="modal-box"><button class="btn-close" onclick="this.closest('.modal').remove()">✕</button><h3>${title}</h3>${content}<div style="display:flex;gap:10px;margin-top:18px"><button class="btn btn-green" id="mSave" style="flex:1">💾 Save</button><button class="btn" id="mCancel" style="flex:1;background:#6c8d9c" onclick="this.closest('.modal').remove()">Cancel</button></div></div>`;document.body.appendChild(m);m.addEventListener('click',e=>{if(e.target===m)m.remove()});m.querySelector('#mSave').addEventListener('click',()=>{const r=onSave(m);if(r!==false)m.remove()});}

// TRANSACTION MODAL
function txnModal(editId=null){const e=editId?transactions.find(x=>x.id===editId):null;showModal(e?'Edit Transaction':'New Transaction',`<div class="form-group"><label>Date</label><input id="md" type="date" value="${e?e.date:new Date().toISOString().slice(0,10)}"></div><div class="form-group"><label>Type</label><select id="mt"><option value="credit" ${e?.type==='credit'?'selected':''}>💚 Credit</option><option value="debit" ${e?.type==='debit'?'selected':''}>🔴 Debit</option></select></div><div class="form-group"><label>Amount (₹)</label><input id="ma" type="number" value="${e?e.amount:''}" min="1"></div><div class="form-group"><label>Site</label><select id="mp">${projects.map(p=>`<option value="${p.id}" ${(siteId===p.id||e?.project_id===p.id)?'selected':''}>${p.name}</option>`).join('')}</select></div><div class="form-group"><label>Vendor</label><select id="mv"><option value="">None</option>${vendors.map(v=>`<option value="${v.id}" ${(vendorId===v.id||e?.vendor_id===v.id)?'selected':''}>${v.name}</option>`).join('')}</select></div><div class="form-group"><label>Notes</label><textarea id="mn">${e?.notes||''}</textarea></div>`,async(m)=>{const d={date:m.querySelector('#md').value,type:m.querySelector('#mt').value,amount:parseFloat(m.querySelector('#ma').value),project_id:m.querySelector('#mp').value,vendor_id:m.querySelector('#mv').value||null,notes:m.querySelector('#mn').value};if(!d.date||isNaN(d.amount)||d.amount<=0||!d.project_id){toast('Fill fields');return false}if(e)await sb.from('transactions').update(d).eq('id',e.id);else await sb.from('transactions').insert([d]);await loadData();toast(e?'Updated!':'Added!');render()})}

// INVENTORY MODALS
function invModal(name=null,action='add'){let t='',c='';if(action==='add'){t='Add New Item';c=`<div class="form-group"><label>Item Name *</label><input id="iname" value="${name||''}"></div><div class="form-group"><label>Quantity *</label><input id="iqty" type="number" min="1" value="1"></div><div class="form-group"><label>Location *</label><select id="iloc">${sitesList.map(s=>`<option>${s}</option>`).join('')}</select></div><div class="form-group"><label>Vendor *</label><select id="ivendor"><option value="">Select</option>${vendors.map(v=>`<option value="${v.name}">${v.name}</option>`).join('')}<option value="Local Supplier">Local Supplier</option><option value="Other">Other</option></select></div><div class="form-group"><label>Unit</label><select id="iunit"><option>Bags</option><option>Tonnes</option><option>Pieces</option><option>Kg</option><option>Units</option></select></div><div class="form-group"><label>Min Stock</label><input id="imin" type="number" min="0" value="10"></div><div class="form-group"><label>Notes</label><textarea id="notes"></textarea></div>`}else if(action==='stock'){t=`Add Stock - ${name}`;c=`<div class="stock-info">📦 ${name}: <b>${fmtNum(getTotalStock(name))}</b> total</div><div class="form-group"><label>Location *</label><select id="aloc">${sitesList.map(s=>`<option>${s}</option>`).join('')}</select></div><div class="form-group"><label>Quantity *</label><input id="aqty" type="number" min="1" value="10"></div><div class="form-group"><label>Vendor *</label><select id="avendor"><option value="">Select</option>${vendors.map(v=>`<option value="${v.name}">${v.name}</option>`).join('')}<option value="Other">Other</option></select></div><div class="form-group"><label>Notes</label><textarea id="notes"></textarea></div>`}else if(action==='use'){t=`Use Stock - ${name}`;const locs=getItemLocs(name);c=`<div class="stock-info">Available: ${locs.map(l=>`<b>${l}</b>: ${getStockAt(name,l)}`).join(' | ')}</div><div class="form-group"><label>From *</label><select id="uloc">${locs.map(l=>`<option>${l}</option>`).join('')}</select></div><div class="form-group"><label>Quantity *</label><input id="uqty" type="number" min="1" value="1"></div><div class="form-group"><label>Used At *</label><select id="usite">${sitesList.map(s=>`<option>${s}</option>`).join('')}</select></div><div class="form-group"><label>Notes</label><textarea id="notes"></textarea></div>`}else{t=`Transfer - ${name}`;const locs=getItemLocs(name);c=`<div class="stock-info">Available: ${locs.map(l=>`<b>${l}</b>: ${getStockAt(name,l)}`).join(' | ')}</div><div class="form-group"><label>From *</label><select id="tfrom">${locs.map(l=>`<option>${l}</option>`).join('')}</select></div><div class="form-group"><label>Quantity *</label><input id="tqty" type="number" min="1" value="1"></div><div class="form-group"><label>To *</label><select id="tto">${sitesList.map(s=>`<option>${s}</option>`).join('')}</select></div><div class="form-group"><label>Notes</label><textarea id="notes"></textarea></div>`}showModal(t,c,async(m)=>{const notes=m.querySelector('#notes')?.value||'';if(action==='add'){const nm=m.querySelector('#iname').value.trim(),q=parseInt(m.querySelector('#iqty').value),l=m.querySelector('#iloc').value,u=m.querySelector('#iunit').value,min=parseInt(m.querySelector('#imin').value),ven=m.querySelector('#ivendor').value;if(!nm||!q||!l||!ven){toast('Fill fields');return false}const ex=invItems.find(i=>i.name===nm&&i.location===l);if(ex)await sb.from('inventory_items').update({quantity:ex.quantity+q,vendor:ven}).eq('id',ex.id);else await sb.from('inventory_items').insert([{name:nm,quantity:q,location:l,unit:u,min_stock:min,vendor:ven}]);await sb.from('inventory_movements').insert([{item_name:nm,type:'add',quantity:q,to_location:l,date:new Date().toISOString().slice(0,10),notes:`Initial: ${notes}`,vendor:ven}]);}else if(action==='stock'){const l=m.querySelector('#aloc').value,q=parseInt(m.querySelector('#aqty').value),ven=m.querySelector('#avendor').value;if(!q||!ven){toast('Fill fields');return false}const ex=invItems.find(i=>i.name===name&&i.location===l);if(ex)await sb.from('inventory_items').update({quantity:ex.quantity+q,vendor:ven}).eq('id',ex.id);else await sb.from('inventory_items').insert([{name,quantity:q,location:l,unit:'Units',min_stock:10,vendor:ven}]);await sb.from('inventory_movements').insert([{item_name:name,type:'add',quantity:q,to_location:l,date:new Date().toISOString().slice(0,10),notes,vendor:ven}]);}else if(action==='use'){const l=m.querySelector('#uloc').value,q=parseInt(m.querySelector('#uqty').value),s=m.querySelector('#usite').value,st=getStockAt(name,l);if(!q||q>st){toast(`Only ${st}`);return false}const ex=invItems.find(i=>i.name===name&&i.location===l);if(ex){const nq=ex.quantity-q;if(nq<=0)await sb.from('inventory_items').delete().eq('id',ex.id);else await sb.from('inventory_items').update({quantity:nq}).eq('id',ex.id)}await sb.from('inventory_movements').insert([{item_name:name,type:'use',quantity:q,from_location:l,to_location:s,date:new Date().toISOString().slice(0,10),notes}]);}else{const f=m.querySelector('#tfrom').value,q=parseInt(m.querySelector('#tqty').value),to=m.querySelector('#tto').value,st=getStockAt(name,f);if(!q||q>st||f===to){toast('Invalid');return false}const fi=invItems.find(i=>i.name===name&&i.location===f);if(fi){const nq=fi.quantity-q;if(nq<=0)await sb.from('inventory_items').delete().eq('id',fi.id);else await sb.from('inventory_items').update({quantity:nq}).eq('id',fi.id)}const ti=invItems.find(i=>i.name===name&&i.location===to);if(ti)await sb.from('inventory_items').update({quantity:ti.quantity+q}).eq('id',ti.id);else await sb.from('inventory_items').insert([{name,quantity:q,location:to,unit:fi?.unit||'Units',min_stock:10,vendor:fi?.vendor||''}]);await sb.from('inventory_movements').insert([{item_name:name,type:'transfer',quantity:q,from_location:f,to_location:to,date:new Date().toISOString().slice(0,10),notes}]);}await loadData();toast('Done!');render()})}

async function delTxn(id){if(!confirm('Delete?'))return;await sb.from('transactions').delete().eq('id',id);await loadData();toast('Deleted!');render()}
async function delMov(id){if(!confirm('Delete?'))return;await sb.from('inventory_movements').delete().eq('id',id);await loadData();toast('Deleted!');render()}
async function addProj(){const n=prompt('Site Name:'),l=prompt('Location:');if(!n||!l)return;await sb.from('projects').insert([{name:n,location:l,start_date:new Date().toISOString().slice(0,10)}]);await loadData();toast('Added!');render()}
async function addVend(){const n=prompt('Vendor Name:'),p=prompt('Phone:')||'',s=prompt('Service:')||'',a=prompt('Address:')||'';if(!n)return;await sb.from('vendors').insert([{name:n,phone:p,service:s,address:a}]);await loadData();toast('Added!');render()}

// EXPORTS
function exportSitePDF(id){const s=projects.find(p=>p.id===id);if(!s)return;const tx=transactions.filter(t=>t.project_id===id),cr=tx.filter(t=>t.type==='credit').reduce((a,b)=>a+Number(b.amount),0),db=tx.filter(t=>t.type==='debit').reduce((a,b)=>a+Number(b.amount),0);exportPDF(s.name,['Date','Type','Amount','Vendor','Notes'],tx.map(t=>[t.date,t.type.toUpperCase(),Number(t.amount).toLocaleString('en-IN'),t.vendor_id?vendors.find(v=>v.id===t.vendor_id)?.name:'-',t.notes||'']),makeSummary([{label:'Credit',value:fmt(cr)},{label:'Debit',value:fmt(db)},{label:'Balance',value:fmt(cr-db)}]),`${s.name}.pdf`)}
function exportVendorPDF(id){const v=vendors.find(x=>x.id===id);if(!v)return;const tx=transactions.filter(t=>t.vendor_id===id),cr=tx.filter(t=>t.type==='credit').reduce((a,b)=>a+Number(b.amount),0),db=tx.filter(t=>t.type==='debit').reduce((a,b)=>a+Number(b.amount),0);exportPDF(v.name,['Date','Site','Type','Amount','Notes'],tx.map(t=>[t.date,projects.find(p=>p.id===t.project_id)?.name||'-',t.type.toUpperCase(),Number(t.amount).toLocaleString('en-IN'),t.notes||'']),makeSummary([{label:'Credit',value:fmt(cr)},{label:'Debit',value:fmt(db)},{label:'Balance',value:fmt(cr-db)}]),`${v.name}.pdf`)}
function exportTxnPDF(){const f=getFilteredTxns(),cr=f.filter(t=>t.type==='credit').reduce((a,b)=>a+Number(b.amount),0),db=f.filter(t=>t.type==='debit').reduce((a,b)=>a+Number(b.amount),0);exportPDF('Transactions',['Date','Type','Amount','Site','Vendor','Notes'],f.map(t=>[t.date,t.type.toUpperCase(),Number(t.amount).toLocaleString('en-IN'),projects.find(p=>p.id===t.project_id)?.name||'-',t.vendor_id?vendors.find(v=>v.id===t.vendor_id)?.name:'-',t.notes||'']),makeSummary([{label:'Credit',value:fmt(cr)},{label:'Debit',value:fmt(db)},{label:'Balance',value:fmt(cr-db)}]),'Transactions.pdf')}

// RENDER
function render(){if(currentView==='dashboard')renderDashboard();else if(currentView==='sites')siteId?renderSiteDetail():renderSites();else if(currentView==='vendors')vendorId?renderVendorDetail():renderVendors();else if(currentView==='transactions')renderTransactions();else if(currentView==='inventory'){if(selItem)showItemDetail(selItem);else if(selLoc)showLocDetail(selLoc);else renderInventory()}}

function renderDashboard(){let cr=0,db=0;transactions.forEach(t=>{if(t.type==='credit')cr+=Number(t.amount);else db+=Number(t.amount)});document.getElementById('content').innerHTML=`<h2>📊 Dashboard</h2><div class="cards"><div class="card" onclick="currentView='sites';render()"><div class="card-title">🏗️ Sites</div><div class="card-value">${projects.length}</div></div><div class="card" onclick="currentView='vendors';render()"><div class="card-title">🚛 Vendors</div><div class="card-value">${vendors.length}</div></div><div class="card" onclick="currentView='transactions';render()"><div class="card-title">💳 Transactions</div><div class="card-value">${transactions.length}</div></div><div class="card" onclick="currentView='inventory';render()"><div class="card-title">📦 Items</div><div class="card-value">${getUniqueItems().length}</div></div><div class="card"><div class="card-title">💰 Balance</div><div class="card-value" style="color:${cr-db>=0?'#16a34a':'#dc2626'}">${fmt(cr-db)}</div></div></div><div class="flex-row"><button class="btn btn-green" onclick="txnModal()">➕ Transaction</button><button class="btn btn-orange" onclick="invModal()">➕ Add Item</button></div><div class="cards"><div class="card"><div class="card-title" style="color:#16a34a">Credits</div><div class="card-value" style="color:#16a34a">${fmt(cr)}</div></div><div class="card"><div class="card-title" style="color:#dc2626">Debits</div><div class="card-value" style="color:#dc2626">${fmt(db)}</div></div></div>`}

function renderSites(){document.getElementById('content').innerHTML=`<h2>🏗️ Sites</h2><div class="flex-row"><button class="btn" onclick="addProj()">➕ Add Site</button></div><div style="display:flex;flex-direction:column;gap:12px">${projects.map(p=>{const cr=transactions.filter(t=>t.project_id===p.id&&t.type==='credit').reduce((s,t)=>s+Number(t.amount),0),db=transactions.filter(t=>t.project_id===p.id&&t.type==='debit').reduce((s,t)=>s+Number(t.amount),0);return`<div class="item-card" onclick="siteId='${p.id}';render()"><div class="item-header"><span class="item-name">🏗️ ${p.name}</span><span class="item-qty" style="color:${cr-db>=0?'#16a34a':'#dc2626'}">${fmt(cr-db)}</span></div><div style="font-size:.7rem;color:#6183a0">📍 ${p.location} | 📅 ${p.start_date}</div></div>`}).join('')}</div>`}

function renderSiteDetail(){const s=projects.find(p=>p.id===siteId);if(!s){siteId=null;render();return}const tx=transactions.filter(t=>t.project_id===siteId),cr=tx.filter(t=>t.type==='credit').reduce((a,b)=>a+Number(b.amount),0),db=tx.filter(t=>t.type==='debit').reduce((a,b)=>a+Number(b.amount),0);document.getElementById('content').innerHTML=`<button class="btn" onclick="siteId=null;render()">← Back</button><div class="detail-header"><div class="detail-inner"><div><h2>🏗️ ${s.name}</h2><p style="color:#6183a0">📍 ${s.location} | 📅 ${s.start_date}</p></div><div class="bal-box"><div class="bal-label">Balance</div><div class="bal-val" style="color:${cr-db>=0?'#16a34a':'#dc2626'}">${fmt(cr-db)}</div></div></div></div><div class="flex-row"><button class="btn btn-green" onclick="txnModal()">➕ Transaction</button><button class="btn btn-red btn-sm" onclick="exportSitePDF('${s.id}')">📄 PDF</button></div><div class="cards"><div class="card"><div class="card-title" style="color:#16a34a">Credit</div><div class="card-value" style="color:#16a34a;font-size:1.3rem">${fmt(cr)}</div></div><div class="card"><div class="card-title" style="color:#dc2626">Debit</div><div class="card-value" style="color:#dc2626;font-size:1.3rem">${fmt(db)}</div></div></div><div style="overflow-x:auto;background:#fff;border-radius:12px"><table><thead><tr><th>Date</th><th>Type</th><th>Credit</th><th>Debit</th><th>Vendor</th><th>Notes</th><th>Actions</th></tr></thead><tbody>${tx.length?tx.map(t=>`<tr><td>${t.date}</td><td><span class="badge ${t.type==='credit'?'badge-c':'badge-d'}">${t.type}</span></td><td style="text-align:right">${t.type==='credit'?fmt(t.amount):'-'}</td><td style="text-align:right">${t.type==='debit'?fmt(t.amount):'-'}</td><td>${t.vendor_id?vendors.find(v=>v.id===t.vendor_id)?.name:'-'}</td><td>${t.notes||'-'}</td><td class="action-icons"><i class="fas fa-edit" onclick="event.stopPropagation();txnModal('${t.id}')"></i><i class="fas fa-trash-alt" onclick="event.stopPropagation();delTxn('${t.id}')"></i></td></tr>`).join('')+`<tr style="background:#f8fafd;font-weight:700"><td colspan="2">Total</td><td style="text-align:right;color:#16a34a">${fmt(cr)}</td><td style="text-align:right;color:#dc2626">${fmt(db)}</td><td colspan="3"></td></tr>`:'<tr><td colspan="7" style="text-align:center;padding:30px">No transactions</td></tr>'}</tbody></table></div>`}

function renderVendors(){document.getElementById('content').innerHTML=`<h2>🚛 Vendors</h2><div class="flex-row"><button class="btn" onclick="addVend()">➕ Add Vendor</button></div><div style="display:flex;flex-direction:column;gap:12px">${vendors.map(v=>{const cr=transactions.filter(t=>t.vendor_id===v.id&&t.type==='credit').reduce((s,t)=>s+Number(t.amount),0),db=transactions.filter(t=>t.vendor_id===v.id&&t.type==='debit').reduce((s,t)=>s+Number(t.amount),0);return`<div class="item-card" onclick="vendorId='${v.id}';render()"><div class="item-header"><span class="item-name">🚛 ${v.name}</span><span class="item-qty" style="color:${cr-db>=0?'#16a34a':'#dc2626'}">${fmt(cr-db)}</span></div><div style="font-size:.7rem;color:#6183a0">${v.service||'Supplier'} | 📞 ${v.phone}</div></div>`}).join('')}</div>`}

function renderVendorDetail(){const v=vendors.find(x=>x.id===vendorId);if(!v){vendorId=null;render();return}const tx=transactions.filter(t=>t.vendor_id===vendorId),cr=tx.filter(t=>t.type==='credit').reduce((a,b)=>a+Number(b.amount),0),db=tx.filter(t=>t.type==='debit').reduce((a,b)=>a+Number(b.amount),0);document.getElementById('content').innerHTML=`<button class="btn" onclick="vendorId=null;render()">← Back</button><div class="detail-header"><div class="detail-inner"><div><h2>🚛 ${v.name}</h2><p style="color:#6183a0">${v.service||'Supplier'} | 📞 ${v.phone} | 📍 ${v.address||''}</p></div><div class="bal-box"><div class="bal-label">Balance</div><div class="bal-val" style="color:${cr-db>=0?'#16a34a':'#dc2626'}">${fmt(cr-db)}</div></div></div></div><div class="flex-row"><button class="btn btn-green" onclick="txnModal()">➕ Transaction</button><button class="btn btn-red btn-sm" onclick="exportVendorPDF('${v.id}')">📄 PDF</button></div><div class="cards"><div class="card"><div class="card-title" style="color:#16a34a">Credit</div><div class="card-value" style="color:#16a34a;font-size:1.3rem">${fmt(cr)}</div></div><div class="card"><div class="card-title" style="color:#dc2626">Debit</div><div class="card-value" style="color:#dc2626;font-size:1.3rem">${fmt(db)}</div></div></div><div style="overflow-x:auto;background:#fff;border-radius:12px"><table><thead><tr><th>Date</th><th>Site</th><th>Type</th><th>Credit</th><th>Debit</th><th>Notes</th><th>Actions</th></tr></thead><tbody>${tx.length?tx.map(t=>`<tr><td>${t.date}</td><td>${projects.find(p=>p.id===t.project_id)?.name||'-'}</td><td><span class="badge ${t.type==='credit'?'badge-c':'badge-d'}">${t.type}</span></td><td style="text-align:right">${t.type==='credit'?fmt(t.amount):'-'}</td><td style="text-align:right">${t.type==='debit'?fmt(t.amount):'-'}</td><td>${t.notes||'-'}</td><td class="action-icons"><i class="fas fa-edit" onclick="event.stopPropagation();txnModal('${t.id}')"></i><i class="fas fa-trash-alt" onclick="event.stopPropagation();delTxn('${t.id}')"></i></td></tr>`).join('')+`<tr style="background:#f8fafd;font-weight:700"><td colspan="3">Total</td><td style="text-align:right;color:#16a34a">${fmt(cr)}</td><td style="text-align:right;color:#dc2626">${fmt(db)}</td><td colspan="2"></td></tr>`:'<tr><td colspan="7" style="text-align:center;padding:30px">No transactions</td></tr>'}</tbody></table></div>`}

function renderTransactions(){const f=getFilteredTxns(),cr=f.filter(t=>t.type==='credit').reduce((a,b)=>a+Number(b.amount),0),db=f.filter(t=>t.type==='debit').reduce((a,b)=>a+Number(b.amount),0);document.getElementById('content').innerHTML=`<h2>💳 Transactions</h2><div class="filter-bar"><input type="date" value="${txnFilter.startDate}" onchange="txnFilter.startDate=this.value;render()"><input type="date" value="${txnFilter.endDate}" onchange="txnFilter.endDate=this.value;render()"><select onchange="txnFilter.projectId=this.value;render()"><option value="">All Sites</option>${projects.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select><select onchange="txnFilter.vendorId=this.value;render()"><option value="">All Vendors</option>${vendors.map(v=>`<option value="${v.id}">${v.name}</option>`).join('')}</select><select onchange="txnFilter.type=this.value;render()"><option value="">All Types</option><option value="credit">Credit</option><option value="debit">Debit</option></select><input type="text" placeholder="🔍 Search" value="${txnFilter.keyword}" oninput="handleSearch(this.value,'txn')"><button class="btn btn-sm" onclick="txnFilter={startDate:'',endDate:'',projectId:'',vendorId:'',type:'',keyword:''};render()">Reset</button></div><div class="flex-row"><button class="btn btn-green" onclick="txnModal()">➕ Add</button><button class="btn btn-red btn-sm" onclick="exportTxnPDF()">📄 PDF</button></div><div class="cards"><div class="card"><div class="card-title" style="color:#16a34a">Credits</div><div class="card-value" style="color:#16a34a;font-size:1.2rem">${fmt(cr)}</div></div><div class="card"><div class="card-title" style="color:#dc2626">Debits</div><div class="card-value" style="color:#dc2626;font-size:1.2rem">${fmt(db)}</div></div></div><div style="overflow-x:auto;background:#fff;border-radius:12px"><table><thead><tr><th>Date</th><th>Type</th><th>Credit</th><th>Debit</th><th>Site</th><th>Vendor</th><th>Notes</th><th>Actions</th></tr></thead><tbody>${f.length?f.map(t=>`<tr><td>${t.date}</td><td><span class="badge ${t.type==='credit'?'badge-c':'badge-d'}">${t.type}</span></td><td style="text-align:right">${t.type==='credit'?fmt(t.amount):'-'}</td><td style="text-align:right">${t.type==='debit'?fmt(t.amount):'-'}</td><td>${projects.find(p=>p.id===t.project_id)?.name||'-'}</td><td>${t.vendor_id?vendors.find(v=>v.id===t.vendor_id)?.name:'-'}</td><td>${t.notes||'-'}</td><td class="action-icons"><i class="fas fa-edit" onclick="event.stopPropagation();txnModal('${t.id}')"></i><i class="fas fa-trash-alt" onclick="event.stopPropagation();delTxn('${t.id}')"></i></td></tr>`).join('')+`<tr style="background:#f8fafd;font-weight:700"><td colspan="2">Total</td><td style="text-align:right;color:#16a34a">${fmt(cr)}</td><td style="text-align:right;color:#dc2626">${fmt(db)}</td><td colspan="4"></td></tr>`:'<tr><td colspan="8" style="text-align:center;padding:30px">No transactions</td></tr>'}</tbody></table></div>`}

function renderInventory(){const ui=getUniqueItems();let fl=ui;if(invTab==='low')fl=ui.filter(n=>getTotalStock(n)<=20&&getTotalStock(n)>0);if(invTab==='out')fl=ui.filter(n=>getTotalStock(n)===0);if(invFilter.keyword)fl=fl.filter(n=>n.toLowerCase().includes(invFilter.keyword.toLowerCase()));document.getElementById('content').innerHTML=`<h2>📦 Inventory</h2><div class="flex-row"><div class="tabs"><button class="tab-btn ${invTab==='all'?'active':''}" onclick="invTab='all';render()">All</button><button class="tab-btn ${invTab==='low'?'active':''}" onclick="invTab='low';render()">⚠️ Low</button><button class="tab-btn ${invTab==='out'?'active':''}" onclick="invTab='out';render()">❌ Out</button></div><button class="btn btn-green" onclick="invModal()">➕ Add</button></div><div class="filter-bar"><input type="text" placeholder="🔍 Search" value="${invFilter.keyword}" oninput="handleSearch(this.value,'inv')"><select onchange="invFilter.location=this.value;render()"><option value="">📍 All</option>${sitesList.map(s=>`<option>${s}</option>`).join('')}</select></div><div style="display:flex;flex-direction:column;gap:12px">${fl.length?fl.map(name=>{const t=getTotalStock(name),l=getItemLocs(name);return`<div class="item-card" onclick="showItemDetail('${name}')"><div class="item-header"><span class="item-name">📦 ${name}</span><span class="item-qty" style="color:${t===0?'#dc2626':t<=20?'#f59e0b':'#16a34a'}">${t===0?'OUT':fmtNum(t)}</span></div><div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px">${l.map(lc=>`<span class="loc-chip ${getStockAt(name,lc)===0?'empty':''}" onclick="event.stopPropagation();showLocDetail('${lc}')">📍 ${lc}: ${fmtNum(getStockAt(name,lc))}</span>`).join('')}</div></div>`}).join(''):'<div style="text-align:center;padding:40px">No items</div>'}</div>`}
function showItemDetail(name){selItem=name;const l=getItemLocs(name),t=getTotalStock(name),m=getMovements(name);document.getElementById('content').innerHTML=`<button class="btn" onclick="selItem=null;render()">← Back</button><div class="detail-header"><div class="detail-inner"><div><h2>📦 ${name}</h2><p style="color:#6183a0">${l.length} locs | ${m.length} moves</p></div><div class="bal-box"><div class="bal-label">Stock</div><div class="bal-val" style="color:${t===0?'#dc2626':t<=20?'#f59e0b':'#16a34a'}">${t===0?'OUT':fmtNum(t)}</div></div></div></div>${t===0?'<div class="stock-info danger">⚠️ Out of stock</div>':''}<div class="flex-row"><button class="btn btn-sm btn-green" onclick="invModal(\''+name+'\',\'stock\')">➕ Add</button><button class="btn btn-sm btn-red" onclick="invModal(\''+name+'\',\'use\')">➖ Use</button><button class="btn btn-sm btn-orange" onclick="invModal(\''+name+'\',\'transfer\')">🚛 Move</button></div><div class="cards">${l.map(lc=>`<div class="card" onclick="showLocDetail('${lc}')"><div class="card-title">📍 ${lc}</div><div class="card-value" style="font-size:1.2rem">${fmtNum(getStockAt(name,lc))}</div></div>`).join('')}</div><h3>📋 Movements</h3><div style="overflow-x:auto;background:#fff;border-radius:12px"><table><thead><tr><th>Date</th><th>Type</th><th>Qty</th><th>From</th><th>To</th><th>Vendor</th><th>Action</th></tr></thead><tbody>${m.map(x=>`<tr><td>${x.date}</td><td><span class="badge ${x.type==='add'?'badge-in':x.type==='use'?'badge-out':'badge-transfer'}">${x.type}</span></td><td>${x.quantity}</td><td>${x.from_location||'-'}</td><td>${x.to_location||'-'}</td><td>${x.vendor||'-'}</td><td class="action-icons"><i class="fas fa-trash-alt" onclick="event.stopPropagation();delMov('${x.id}')"></i></td></tr>`).join('')}</tbody></table></div>`}
function showLocDetail(loc){selLoc=loc;const it=invItems.filter(i=>i.location===loc);document.getElementById('content').innerHTML=`<button class="btn" onclick="selLoc=null;render()">← Back</button><div class="detail-header"><h2>📍 ${loc}</h2><p style="color:#6183a0">${it.length} items | ${fmtNum(it.reduce((s,i)=>s+i.quantity,0))} units</p></div><div class="cards">${it.map(i=>`<div class="card" onclick="showItemDetail('${i.name}')"><div class="card-title">📦 ${i.name}</div><div class="card-value" style="font-size:1.2rem">${fmtNum(i.quantity)} ${i.unit}</div></div>`).join('')}</div>`}

// NAV
document.querySelectorAll('#mainApp .nav-link').forEach(l=>{l.addEventListener('click',()=>{currentView=l.dataset.view;siteId=null;vendorId=null;selItem=null;selLoc=null;document.querySelectorAll('#mainApp .nav-link').forEach(x=>x.classList.remove('active'));l.classList.add('active');render()})});

// INIT
async function init(){const{data:{session}}=await sb.auth.getSession();if(session){document.getElementById('loginScreen').style.display='none';document.getElementById('mainApp').style.display='block';await loadData();render()}}
init();
</script>
</body>
</html>
