function toast(m){const e=document.createElement('div');e.className='toast';e.textContent=m;document.body.appendChild(e);setTimeout(()=>{e.style.opacity='0';e.style.transition='opacity .3s';setTimeout(()=>e.remove(),300)},2000)}

async function doLogin(){const e=document.getElementById('loginEmail').value.trim(),p=document.getElementById('loginPass').value,er=document.getElementById('loginError');er.style.display='none';if(!e||!p){er.textContent='Enter email and password';er.style.display='block';return}const{data,error}=await sb.auth.signInWithPassword({email:e,password:p});if(error){er.textContent='❌ '+error.message;er.style.display='block'}else{document.getElementById('loginScreen').style.display='none';document.getElementById('mainApp').style.display='block';await loadData();render()}}

async function loadData(){const[p,v,t,i,m]=await Promise.all([sb.from('projects').select('*').order('name'),sb.from('vendors').select('*').order('name'),sb.from('transactions').select('*').order('date',{ascending:false}),sb.from('inventory_items').select('*').order('name'),sb.from('inventory_movements').select('*').order('date',{ascending:false})]);projects=p.data||[];vendors=v.data||[];transactions=t.data||[];invItems=i.data||[];invMoves=m.data||[];if(!projects.length)projects=[{id:'p1',name:'Lakeside Greens',location:'Padubidri',start_date:'2025-01-10'},{id:'p2',name:'Palm Heights',location:'Kannangar',start_date:'2025-03-05'},{id:'p3',name:'SUHA Corporate Park',location:'Mangalore',start_date:'2025-08-20'}];if(!vendors.length)vendors=[{id:'v1',name:'Mahadev Cement Works',phone:'9876543210',service:'Cement Supply'},{id:'v2',name:'Sai Steel Industries',phone:'9988766550',service:'TMT Steel'},{id:'v3',name:'Rockland Earthmovers',phone:'9123456789',service:'Heavy Equipment'}];if(!invItems.length){invItems=[{id:'d1',name:'Cement',quantity:50,location:'Hejamadi Godown',unit:'Bags',min_stock:20},{id:'d2',name:'Cement',quantity:0,location:'Inzam Site',unit:'Bags',min_stock:20},{id:'d3',name:'Steel TMT Bars',quantity:200,location:'Hejamadi Godown',unit:'Pieces',min_stock:50},{id:'d4',name:'Bricks',quantity:5000,location:'Hejamadi Godown',unit:'Pieces',min_stock:1000},{id:'d5',name:'Sand',quantity:0,location:'Warehouse Kodi',unit:'Tonnes',min_stock:5}];invMoves=[];}}
function getUniqueItems(){return[...new Set(invItems.map(i=>i.name))]}
function getItemLocs(name){return invItems.filter(i=>i.name===name).map(i=>i.location)}
function getStockAt(name,loc){const i=invItems.find(x=>x.name===name&&x.location===loc);return i?i.quantity:0}
function getTotalStock(name){return invItems.filter(i=>i.name===name).reduce((s,i)=>s+i.quantity,0)}
function getMovements(name){return invMoves.filter(m=>m.item_name===name).sort((a,b)=>new Date(b.date)-new Date(a.date))}
function getFilteredTxns(){let f=[...transactions];if(txnFilter.startDate)f=f.filter(t=>t.date>=txnFilter.startDate);if(txnFilter.endDate)f=f.filter(t=>t.date<=txnFilter.endDate);if(txnFilter.projectId)f=f.filter(t=>t.project_id===txnFilter.projectId);if(txnFilter.vendorId)f=f.filter(t=>t.vendor_id===txnFilter.vendorId);if(txnFilter.type)f=f.filter(t=>t.type===txnFilter.type);if(txnFilter.keyword){const k=txnFilter.keyword.toLowerCase();f=f.filter(t=>(t.notes&&t.notes.toLowerCase().includes(k))||(projects.find(p=>p.id===t.project_id)?.name?.toLowerCase().includes(k))||(t.receiver_name&&t.receiver_name.toLowerCase().includes(k)))}return f}

// PDF Export
function exportPDF(title,headers,rows,summary,filename){const e=document.createElement('div');e.style.cssText='padding:25px;font-family:Arial;max-width:850px;background:white';let h=companyHdr()+`<h2 style="text-align:center;color:#1e5f7a;font-size:16px">${title}</h2><p style="text-align:center;font-size:9px;color:#888">${new Date().toLocaleString('en-IN')}</p>`;if(summary)h+=summary;h+=`<table style="width:100%;border-collapse:collapse;font-size:9px"><thead><tr style="background:#1e5f7a;color:white">${headers.map(hd=>`<th style="padding:8px 6px;border:1px solid #1e5f7a">${hd}</th>`).join('')}</tr></thead><tbody>${rows.map((r,i)=>`<tr style="background:${i%2===0?'#fff':'#f8fafd'}">${r.map(c=>`<td style="padding:6px;border:1px solid #ddd">${c}</td>`).join('')}</tr>`).join('')}</tbody></table>`;e.innerHTML=h;html2pdf().from(e).set({margin:.35,filename:filename||'Report.pdf'}).save();toast('📄 PDF!')}

// ===== RECEIPT WITH AUTO-FILL =====
function showReceiptForTxn(txnId){
    const txn=transactions.find(t=>t.id===txnId);
    if(!txn||txn.type!=='credit'){toast('Only credit transactions can generate receipt');return;}
    
    const entityName=txn.project_id?projects.find(p=>p.id===txn.project_id)?.name||'':vendors.find(v=>v.id===txn.vendor_id)?.name||'';
    const purpose=txn.notes||'Payment received';
    const date=txn.date;
    const amount=txn.amount;
    const existingReceiver=txn.receiver_name||'';
    const existingMode=txn.payment_mode||'Cash';
    
    showModal(`🧾 Generate Receipt`,`<div class="form-group"><label>Receiver Name <span class="req">*</span></label><input id="recName" value="${existingReceiver}" placeholder="Who received the payment?" autofocus></div><div class="form-group"><label>Amount (₹)</label><input id="recAmt" type="number" value="${amount}" readonly style="background:#f0fdf4;font-weight:700;font-size:1.1rem"></div><div class="form-group"><label>Payment Mode</label><select id="recMode"><option value="Cash" ${existingMode==='Cash'?'selected':''}>💵 Cash</option><option value="Bank Transfer" ${existingMode==='Bank Transfer'?'selected':''}>🏦 Bank Transfer</option><option value="Cheque" ${existingMode==='Cheque'?'selected':''}>📝 Cheque</option><option value="UPI" ${existingMode==='UPI'?'selected':''}>📱 UPI</option></select></div><div class="form-group"><label>For (Purpose)</label><input id="recFor" value="${purpose}"></div><div class="form-group"><label>Receipt Date</label><input id="recDate" type="date" value="${date}"></div>`,(m)=>{
        const rName=m.querySelector('#recName').value.trim(),rMode=m.querySelector('#recMode').value,rFor=m.querySelector('#recFor').value.trim(),rDate=m.querySelector('#recDate').value;
        if(!rName){toast('Enter receiver name');return false}
        // Save receiver info to transaction
        txn.receiver_name=rName;txn.payment_mode=rMode;
        sb.from('transactions').update({receiver_name:rName,payment_mode:rMode}).eq('id',txn.id).then(()=>{});
        generateReceiptPDF(entityName||'Client',rName,amount,rMode,rFor,rDate,txnId,entityName);
    });
}

    html2pdf().from(e).set({margin:.4,filename:`Receipt_${recName.replace(/\s/g,'_')}_${date}.pdf`}).save();toast('🧾 Receipt downloaded!');

function numberToWords(num){const ones=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];const tens=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];if(num==0)return'Zero';function convert(n){if(n<20)return ones[n];if(n<100)return tens[Math.floor(n/10)]+(n%10?' '+ones[n%10]:'');if(n<1000)return ones[Math.floor(n/100)]+' Hundred'+(n%100?' and '+convert(n%100):'');if(n<100000)return convert(Math.floor(n/1000))+' Thousand'+(n%1000?' '+convert(n%1000):'');if(n<10000000)return convert(Math.floor(n/100000))+' Lakh'+(n%100000?' '+convert(n%100000):'');return convert(Math.floor(n/10000000))+' Crore'+(n%10000000?' '+convert(n%10000000):'')}return convert(Math.floor(num))}

// Export functions
function exportTxnPDF(){const f=getFilteredTxns(),cr=f.filter(t=>t.type==='credit').reduce((a,b)=>a+Number(b.amount),0),db=f.filter(t=>t.type==='debit').reduce((a,b)=>a+Number(b.amount),0);const rows=f.map(t=>[t.date,t.type.toUpperCase(),t.type==='credit'?Number(t.amount).toLocaleString('en-IN'):'-',t.type==='debit'?Number(t.amount).toLocaleString('en-IN'):'-',projects.find(p=>p.id===t.project_id)?.name||(t.vendor_id?'Vendor':'-'),t.vendor_id?vendors.find(v=>v.id===t.vendor_id)?.name:'-',t.receiver_name||'-',t.payment_mode||'-',t.notes||'']);rows.push(['','TOTAL',cr.toLocaleString('en-IN'),db.toLocaleString('en-IN'),'','','','',`Balance: ${(cr-db).toLocaleString('en-IN')}`]);exportPDF('Transaction Report',['Date','Type','Credit ₹','Debit ₹','Site','Vendor','Receiver','Mode','Notes'],rows,makeSummary([{label:'Credit',value:fmt(cr)},{label:'Debit',value:fmt(db)},{label:'Balance',value:fmt(cr-db)}]),'Transactions.pdf')}
function exportSitePDF(id){const s=projects.find(p=>p.id===id);if(!s)return;const tx=transactions.filter(t=>t.project_id===id),cr=tx.filter(t=>t.type==='credit').reduce((a,b)=>a+Number(b.amount),0),db=tx.filter(t=>t.type==='debit').reduce((a,b)=>a+Number(b.amount),0);const rows=tx.map(t=>[t.date,t.type.toUpperCase(),t.type==='credit'?Number(t.amount).toLocaleString('en-IN'):'-',t.type==='debit'?Number(t.amount).toLocaleString('en-IN'):'-',t.vendor_id?vendors.find(v=>v.id===t.vendor_id)?.name:'-',t.receiver_name||'-',t.payment_mode||'-',t.notes||'']);rows.push(['','TOTAL',cr.toLocaleString('en-IN'),db.toLocaleString('en-IN'),'','','',`Balance: ${(cr-db).toLocaleString('en-IN')}`]);exportPDF(s.name,['Date','Type','Credit ₹','Debit ₹','Vendor','Receiver','Mode','Notes'],rows,makeSummary([{label:'Site',value:s.name},{label:'Credit',value:fmt(cr)},{label:'Debit',value:fmt(db)},{label:'Balance',value:fmt(cr-db)}]),`${s.name}.pdf`)}
function exportVendorPDF(id){const v=vendors.find(x=>x.id===id);if(!v)return;const tx=transactions.filter(t=>t.vendor_id===id),cr=tx.filter(t=>t.type==='credit').reduce((a,b)=>a+Number(b.amount),0),db=tx.filter(t=>t.type==='debit').reduce((a,b)=>a+Number(b.amount),0);const rows=tx.map(t=>[t.date,t.type.toUpperCase(),t.type==='credit'?Number(t.amount).toLocaleString('en-IN'):'-',t.type==='debit'?Number(t.amount).toLocaleString('en-IN'):'-',t.receiver_name||'-',t.notes||'']);rows.push(['','TOTAL',cr.toLocaleString('en-IN'),db.toLocaleString('en-IN'),'',`Balance: ${(cr-db).toLocaleString('en-IN')}`]);exportPDF(v.name,['Date','Type','Credit ₹','Debit ₹','Receiver','Notes'],rows,makeSummary([{label:'Vendor',value:v.name},{label:'Credit',value:fmt(cr)},{label:'Debit',value:fmt(db)},{label:'Balance',value:fmt(cr-db)}]),`${v.name}.pdf`)}

function showModal(title,content,onSave){const ex=document.querySelector('.modal');if(ex)ex.remove();const m=document.createElement('div');m.className='modal';m.style.display='flex';m.innerHTML=`<div class="modal-box"><h3>${title}</h3>${content}<div style="display:flex;gap:10px;margin-top:16px"><button class="btn btn-green" id="mSave" style="flex:1">💾 Save</button><button class="btn" id="mCancel" style="flex:1;background:#6c8d9c" onclick="this.closest('.modal').remove()">Cancel</button></div></div>`;document.body.appendChild(m);m.addEventListener('click',e=>{if(e.target===m)m.remove()});m.querySelector('#mSave').addEventListener('click',()=>{const r=onSave(m);if(r!==false)m.remove()});}

function addSiteModal(){showModal('➕ Add New Site',`<div class="form-group"><label>Site Name <span class="req">*</span></label><input id="sName" placeholder="e.g., Lakeside Greens" autofocus></div><div class="form-group"><label>Location <span class="req">*</span></label><input id="sLoc" placeholder="e.g., Padubidri"></div><div class="form-group"><label>Contact Number</label><input id="sPhone" placeholder="+91 98765 43210"></div><div class="form-group"><label>Start Date</label><input id="sDate" type="date" value="${new Date().toISOString().slice(0,10)}"></div>`,async(m)=>{const n=m.querySelector('#sName').value.trim(),l=m.querySelector('#sLoc').value.trim();if(!n||!l){toast('Fill fields');return false}await sb.from('projects').insert([{name:n,location:l,phone:m.querySelector('#sPhone').value,start_date:m.querySelector('#sDate').value}]);await loadData();toast('✅ Site added!');render()})}
function addVendorModal(){showModal('➕ Add New Vendor',`<div class="form-group"><label>Company Name <span class="req">*</span></label><input id="vName" placeholder="e.g., Mahadev Cement Works" autofocus></div><div class="form-group"><label>Phone Number</label><input id="vPhone" placeholder="+91 98765 43210"></div><div class="form-group"><label>What They Supply</label><input id="vService" placeholder="e.g., Cement Supply"></div><div class="form-group"><label>Address</label><input id="vAddress" placeholder="e.g., Mangalore"></div>`,async(m)=>{const n=m.querySelector('#vName').value.trim();if(!n){toast('Enter name');return false}await sb.from('vendors').insert([{name:n,phone:m.querySelector('#vPhone').value,service:m.querySelector('#vService').value,address:m.querySelector('#vAddress').value}]);await loadData();toast('✅ Vendor added!');render()})}

function txnModal(editId=null,preVendorId=null){
    const e=editId?transactions.find(x=>x.id===editId):null;
    const isVendorTxn=!!(preVendorId||vendorId||(e&&e.vendor_id&&!e.project_id));
    let siteField=`<div class="form-group"><label>Site <span class="req">*</span></label><select id="mp">${projects.map(p=>`<option value="${p.id}" ${(siteId===p.id||e?.project_id===p.id)?'selected':''}>${p.name}</option>`).join('')}</select></div>`;
    if(isVendorTxn)siteField='';
    const vid=preVendorId||vendorId||e?.vendor_id||'';
    const isCredit=e?e.type==='credit':false;
    let receiverFields='';
    if(isCredit||!e){
        receiverFields=`<div class="form-group"><label>Receiver Name</label><input id="recName" value="${e?.receiver_name||''}" placeholder="Who received the payment?"></div><div class="form-group"><label>Payment Mode</label><select id="payMode"><option value="Cash" ${e?.payment_mode==='Cash'?'selected':''}>💵 Cash</option><option value="Bank Transfer" ${e?.payment_mode==='Bank Transfer'?'selected':''}>🏦 Bank Transfer</option><option value="Cheque" ${e?.payment_mode==='Cheque'?'selected':''}>📝 Cheque</option><option value="UPI" ${e?.payment_mode==='UPI'?'selected':''}>📱 UPI</option></select></div>`;
    }
    showModal(e?'Edit Transaction':'New Transaction',`<div class="form-group"><label>Date <span class="req">*</span></label><input id="md" type="date" value="${e?e.date:new Date().toISOString().slice(0,10)}"></div><div class="form-group"><label>Type <span class="req">*</span></label><select id="mt" onchange="toggleReceiverFields(this.value)"><option value="credit" ${e?.type==='credit'?'selected':''}>💚 Credit</option><option value="debit" ${e?.type==='debit'?'selected':''}>🔴 Debit</option></select></div><div class="form-group"><label>Amount ₹ <span class="req">*</span></label><input id="ma" type="number" value="${e?e.amount:''}" min="1"></div>${siteField}<div class="form-group"><label>Vendor</label><select id="mv"><option value="">None</option>${vendors.map(v=>`<option value="${v.id}" ${(vid===v.id)?'selected':''}>${v.name}</option>`).join('')}</select></div><div id="receiverFields">${receiverFields}</div><div class="form-group"><label>Notes</label><textarea id="mn">${e?.notes||''}</textarea></div>`,async(m)=>{const d={date:m.querySelector('#md').value,type:m.querySelector('#mt').value,amount:parseFloat(m.querySelector('#ma').value),project_id:isVendorTxn?null:m.querySelector('#mp')?.value||null,vendor_id:m.querySelector('#mv').value||null,notes:m.querySelector('#mn').value,receiver_name:m.querySelector('#recName')?.value||null,payment_mode:m.querySelector('#payMode')?.value||null};if(!d.date||isNaN(d.amount)||d.amount<=0){toast('Fill fields');return false}if(e)await sb.from('transactions').update(d).eq('id',e.id);else await sb.from('transactions').insert([d]);await loadData();toast(e?'Updated!':'Added!');render()})}
function toggleReceiverFields(type){const rf=document.getElementById('receiverFields');if(rf)rf.style.display=type==='credit'?'block':'none';}

function addLocationPopup(callback){showModal('➕ Add Location',`<div class="form-group"><label>Location Name <span class="req">*</span></label><input id="newLocName" placeholder="e.g., Warehouse Kodi" autofocus></div>`,(m)=>{const name=m.querySelector('#newLocName').value.trim();if(!name){toast('Enter name');return false}if(!myLocations.includes(name)){myLocations.push(name);toast('✅ Added!')}if(callback)callback(name);})}

function invModal(name=null,action='add'){let t='',c='';const locOpts=myLocations.map(s=>`<option>${s}</option>`).join('');const locSel=(id)=>`<select id="${id}">${locOpts}</select><span class="add-loc-link" onclick="addLocationPopup((loc)=>{const s=document.getElementById('${id}');const o=document.createElement('option');o.text=loc;o.selected=true;s.appendChild(o)})">+ Add</span>`;if(action==='add'){t='Add New Item';c=`<div class="form-group"><label>Item Name <span class="req">*</span></label><input id="iname" value="${name||''}"></div><div class="form-group"><label>Qty <span class="req">*</span></label><input id="iqty" type="number" min="1" value="1"></div><div class="form-group"><label>Location <span class="req">*</span></label>${locSel('iloc')}</div><div class="form-group"><label>Vendor <span class="req">*</span></label><select id="ivendor"><option value="">Select</option>${vendors.map(v=>`<option value="${v.name}">${v.name}</option>`).join('')}<option value="Other">Other</option></select></div><div class="form-group"><label>Unit</label><select id="iunit"><option>Bags</option><option>Tonnes</option><option>Pieces</option><option>Kg</option><option>Units</option></select></div><div class="form-group"><label>Min Stock</label><input id="imin" type="number" min="0" value="10"></div><div class="form-group"><label>Notes</label><textarea id="notes"></textarea></div>`}else if(action==='stock'){t=`Add Stock - ${name}`;c=`<div class="stock-info">📦 ${name}: <b>${fmtNum(getTotalStock(name))}</b></div><div class="form-group"><label>Location <span class="req">*</span></label>${locSel('aloc')}</div><div class="form-group"><label>Qty <span class="req">*</span></label><input id="aqty" type="number" min="1" value="10" autofocus></div><div class="form-group"><label>Vendor <span class="req">*</span></label><select id="avendor"><option value="">Select</option>${vendors.map(v=>`<option value="${v.name}">${v.name}</option>`).join('')}<option value="Other">Other</option></select></div><div class="form-group"><label>Notes</label><textarea id="notes"></textarea></div>`}else if(action==='use'){const locs=getItemLocs(name);const av=locs.length?locs.map(l=>`<b>${l}</b>: ${getStockAt(name,l)}`).join(' | '):'No stock!';t=`Use Stock - ${name}`;c=`<div class="stock-info">Available: ${av}</div><div class="form-group"><label>From <span class="req">*</span></label><select id="uloc">${locs.length?locs.map(l=>`<option>${l}</option>`).join(''):'<option>No locations</option>'}</select></div><div class="form-group"><label>Qty <span class="req">*</span></label><input id="uqty" type="number" min="1" value="1" autofocus></div><div class="form-group"><label>Used At <span class="req">*</span></label>${locSel('usite')}</div><div class="form-group"><label>Notes</label><textarea id="notes"></textarea></div>`}else{const locs=getItemLocs(name);const av=locs.length?locs.map(l=>`<b>${l}</b>: ${getStockAt(name,l)}`).join(' | '):'No stock!';t=`Transfer - ${name}`;c=`<div class="stock-info">Available: ${av}</div><div class="form-group"><label>From <span class="req">*</span></label><select id="tfrom">${locs.length?locs.map(l=>`<option>${l}</option>`).join(''):'<option>No locations</option>'}</select></div><div class="form-group"><label>Qty <span class="req">*</span></label><input id="tqty" type="number" min="1" value="1" autofocus></div><div class="form-group"><label>To <span class="req">*</span></label>${locSel('tto')}</div><div class="form-group"><label>Notes</label><textarea id="notes"></textarea></div>`}showModal(t,c,async(m)=>{const notes=m.querySelector('#notes')?.value||'';if(action==='add'){const nm=m.querySelector('#iname').value.trim(),q=parseInt(m.querySelector('#iqty').value),l=m.querySelector('#iloc').value,u=m.querySelector('#iunit').value,min=parseInt(m.querySelector('#imin').value),ven=m.querySelector('#ivendor').value;if(!nm||!q||!l||!ven){toast('Fill fields');return false}const ex=invItems.find(i=>i.name===nm&&i.location===l);if(ex){ex.quantity+=q}else{invItems.push({id:'i'+Date.now(),name:nm,quantity:q,location:l,unit:u,min_stock:min,vendor:ven})}invMoves.push({id:'m'+Date.now(),item_name:nm,type:'add',quantity:q,to_location:l,date:new Date().toISOString().slice(0,10),notes:`Initial: ${notes}`});}else if(action==='stock'){const l=m.querySelector('#aloc').value,q=parseInt(m.querySelector('#aqty').value),ven=m.querySelector('#avendor').value;if(!q||!ven){toast('Fill fields');return false}const ex=invItems.find(i=>i.name===name&&i.location===l);if(ex){ex.quantity+=q}else{invItems.push({id:'i'+Date.now(),name,quantity:q,location:l,unit:'Units',min_stock:10,vendor:ven})}invMoves.push({id:'m'+Date.now(),item_name:name,type:'add',quantity:q,to_location:l,date:new Date().toISOString().slice(0,10),notes});}else if(action==='use'){const l=m.querySelector('#uloc').value,q=parseInt(m.querySelector('#uqty').value),s=m.querySelector('#usite').value,st=getStockAt(name,l);if(!l||!q||q>st){toast('Invalid');return false}const ex=invItems.find(i=>i.name===name&&i.location===l);if(ex){ex.quantity-=q;if(ex.quantity<=0)ex.quantity=0}invMoves.push({id:'m'+Date.now(),item_name:name,type:'use',quantity:q,from_location:l,to_location:s,date:new Date().toISOString().slice(0,10),notes});}else{const f=m.querySelector('#tfrom').value,q=parseInt(m.querySelector('#tqty').value),to=m.querySelector('#tto').value,st=getStockAt(name,f);if(!f||!q||q>st||f===to){toast('Invalid');return false}const fi=invItems.find(i=>i.name===name&&i.location===f);if(fi){fi.quantity-=q;if(fi.quantity<=0)fi.quantity=0}const ti=invItems.find(i=>i.name===name&&i.location===to);if(ti){ti.quantity+=q}else{invItems.push({id:'i'+Date.now(),name,quantity:q,location:to,unit:fi?.unit||'Units',min_stock:10})}invMoves.push({id:'m'+Date.now(),item_name:name,type:'transfer',quantity:q,from_location:f,to_location:to,date:new Date().toISOString().slice(0,10),notes});}render();toast('Done!')})}
async function delTxn(id){if(!confirm('Delete?'))return;await sb.from('transactions').delete().eq('id',id);await loadData();toast('Deleted!');render()}

// RENDER
function render(){if(currentView==='dashboard')renderDashboard();else if(currentView==='sites')siteId?renderSiteDetail():renderSites();else if(currentView==='vendors')vendorId?renderVendorDetail():renderVendors();else if(currentView==='transactions')renderTransactions();else if(currentView==='inventory'){if(selItem)showItemDetail(selItem);else if(selLoc)showLocDetail(selLoc);else renderInventory()}}

function renderDashboard(){let cr=0,db=0;transactions.forEach(t=>{if(t.type==='credit')cr+=Number(t.amount);else db+=Number(t.amount)});document.getElementById('content').innerHTML=`<h2>📊 Dashboard</h2><div class="cards"><div class="card" onclick="currentView='sites';render()"><div class="card-title">🏗️ Sites</div><div class="card-value">${projects.length}</div></div><div class="card" onclick="currentView='vendors';render()"><div class="card-title">🚛 Vendors</div><div class="card-value">${vendors.length}</div></div><div class="card" onclick="currentView='transactions';render()"><div class="card-title">💳 Transactions</div><div class="card-value">${transactions.length}</div></div><div class="card" onclick="currentView='inventory';render()"><div class="card-title">📦 Items</div><div class="card-value">${getUniqueItems().length}</div></div><div class="card"><div class="card-title">💰 Balance</div><div class="card-value" style="color:${cr-db>=0?'#16a34a':'#dc2626'}">${fmt(cr-db)}</div></div></div><div class="flex-row"><button class="btn btn-green" onclick="txnModal()">➕ Transaction</button><button class="btn btn-orange" onclick="invModal()">➕ Add Item</button></div>`}
function renderSites(){document.getElementById('content').innerHTML=`<h2>🏗️ Sites</h2><div class="flex-row"><button class="btn" onclick="addSiteModal()">➕ Add Site</button></div><div style="display:flex;flex-direction:column;gap:12px">${projects.map(p=>{const cr=transactions.filter(t=>t.project_id===p.id&&t.type==='credit').reduce((s,t)=>s+Number(t.amount),0),db=transactions.filter(t=>t.project_id===p.id&&t.type==='debit').reduce((s,t)=>s+Number(t.amount),0);return`<div class="item-card" onclick="siteId='${p.id}';render()"><div class="item-header"><span class="item-name">🏗️ ${p.name}</span><span class="item-qty" style="color:${cr-db>=0?'#16a34a':'#dc2626'}">${fmt(cr-db)}</span></div><div style="font-size:.7rem;color:#6183a0">📍 ${p.location}</div></div>`}).join('')||'<div style="text-align:center;padding:40px">No sites</div>'}</div>`}
function renderSiteDetail(){const s=projects.find(p=>p.id===siteId);if(!s){siteId=null;render();return}const tx=transactions.filter(t=>t.project_id===siteId),cr=tx.filter(t=>t.type==='credit').reduce((a,b)=>a+Number(b.amount),0),db=tx.filter(t=>t.type==='debit').reduce((a,b)=>a+Number(b.amount),0);document.getElementById('content').innerHTML=`<button class="btn" onclick="siteId=null;render()">← Back</button><div class="detail-header"><div class="detail-inner"><div><h2>🏗️ ${s.name}</h2><p style="color:#6183a0">📍 ${s.location} | 📅 ${s.start_date}</p></div><div class="bal-box"><div class="bal-label">Balance</div><div class="bal-val" style="color:${cr-db>=0?'#16a34a':'#dc2626'}">${fmt(cr-db)}</div></div></div></div><div class="flex-row"><button class="btn btn-green" onclick="txnModal()">➕ Transaction</button><button class="btn btn-red btn-sm" onclick="exportSitePDF('${s.id}')">📄 PDF</button></div><div style="overflow-x:auto;background:#fff;border-radius:12px"><table><thead><tr><th>Date</th><th>Type</th><th>Credit</th><th>Debit</th><th>Vendor</th><th>Receiver</th><th>Notes</th><th>Actions</th></tr></thead><tbody>${tx.length?tx.map(t=>`<tr><td>${t.date}</td><td><span class="badge ${t.type==='credit'?'badge-c':'badge-d'}">${t.type}</span></td><td style="text-align:right">${t.type==='credit'?fmt(t.amount):'-'}</td><td style="text-align:right">${t.type==='debit'?fmt(t.amount):'-'}</td><td>${t.vendor_id?vendors.find(v=>v.id===t.vendor_id)?.name:'-'}</td><td>${t.receiver_name||'-'}</td><td>${t.notes||'-'}</td><td class="action-icons"><i class="fas fa-edit" onclick="event.stopPropagation();txnModal('${t.id}')"></i><i class="fas fa-trash-alt" onclick="event.stopPropagation();delTxn('${t.id}')"></i>${t.type==='credit'?`<button class="btn-receipt" onclick="event.stopPropagation();showReceiptForTxn('${t.id}')" title="Generate Receipt">🧾</button>`:''}</td></tr>`).join('')+`<tr style="background:#f8fafd;font-weight:700"><td colspan="2">Total</td><td style="text-align:right;color:#16a34a">${fmt(cr)}</td><td style="text-align:right;color:#dc2626">${fmt(db)}</td><td colspan="4"></td></tr>`:'<tr><td colspan="8" style="text-align:center;padding:30px">No transactions</td></tr>'}</tbody></table></div>`}
function renderVendors(){document.getElementById('content').innerHTML=`<h2>🚛 Vendors</h2><div class="flex-row"><button class="btn" onclick="addVendorModal()">➕ Add Vendor</button></div><div style="display:flex;flex-direction:column;gap:12px">${vendors.map(v=>{const cr=transactions.filter(t=>t.vendor_id===v.id&&t.type==='credit').reduce((s,t)=>s+Number(t.amount),0),db=transactions.filter(t=>t.vendor_id===v.id&&t.type==='debit').reduce((s,t)=>s+Number(t.amount),0);return`<div class="item-card" onclick="vendorId='${v.id}';render()"><div class="item-header"><span class="item-name">🚛 ${v.name}</span><span class="item-qty" style="color:${cr-db>=0?'#16a34a':'#dc2626'}">${fmt(cr-db)}</span></div><div style="font-size:.7rem;color:#6183a0">${v.service||'Supplier'} | 📞 ${v.phone}</div></div>`}).join('')||'<div style="text-align:center;padding:40px">No vendors</div>'}</div>`}
function renderVendorDetail(){const v=vendors.find(x=>x.id===vendorId);if(!v){vendorId=null;render();return}const tx=transactions.filter(t=>t.vendor_id===vendorId),cr=tx.filter(t=>t.type==='credit').reduce((a,b)=>a+Number(b.amount),0),db=tx.filter(t=>t.type==='debit').reduce((a,b)=>a+Number(b.amount),0);document.getElementById('content').innerHTML=`<button class="btn" onclick="vendorId=null;render()">← Back</button><div class="detail-header"><div class="detail-inner"><div><h2>🚛 ${v.name}</h2><p style="color:#6183a0">${v.service||'Supplier'} | 📞 ${v.phone}</p></div><div class="bal-box"><div class="bal-label">Balance</div><div class="bal-val" style="color:${cr-db>=0?'#16a34a':'#dc2626'}">${fmt(cr-db)}</div></div></div></div><div class="flex-row"><button class="btn btn-green" onclick="txnModal(null,'${v.id}')">➕ Transaction</button><button class="btn btn-red btn-sm" onclick="exportVendorPDF('${v.id}')">📄 PDF</button></div><div style="overflow-x:auto;background:#fff;border-radius:12px"><table><thead><tr><th>Date</th><th>Type</th><th>Credit</th><th>Debit</th><th>Receiver</th><th>Notes</th><th>Actions</th></tr></thead><tbody>${tx.length?tx.map(t=>`<tr><td>${t.date}</td><td><span class="badge ${t.type==='credit'?'badge-c':'badge-d'}">${t.type}</span></td><td style="text-align:right">${t.type==='credit'?fmt(t.amount):'-'}</td><td style="text-align:right">${t.type==='debit'?fmt(t.amount):'-'}</td><td>${t.receiver_name||'-'}</td><td>${t.notes||'-'}</td><td class="action-icons"><i class="fas fa-edit" onclick="event.stopPropagation();txnModal('${t.id}')"></i><i class="fas fa-trash-alt" onclick="event.stopPropagation();delTxn('${t.id}')"></i>${t.type==='credit'?`<button class="btn-receipt" onclick="event.stopPropagation();showReceiptForTxn('${t.id}')" title="Generate Receipt">🧾</button>`:''}</td></tr>`).join('')+`<tr style="background:#f8fafd;font-weight:700"><td colspan="2">Total</td><td style="text-align:right;color:#16a34a">${fmt(cr)}</td><td style="text-align:right;color:#dc2626">${fmt(db)}</td><td colspan="3"></td></tr>`:'<tr><td colspan="7" style="text-align:center;padding:30px">No transactions</td></tr>'}</tbody></table></div>`}
function renderTransactions(){const f=getFilteredTxns(),cr=f.filter(t=>t.type==='credit').reduce((a,b)=>a+Number(b.amount),0),db=f.filter(t=>t.type==='debit').reduce((a,b)=>a+Number(b.amount),0);document.getElementById('content').innerHTML=`<h2>💳 Transactions</h2><div class="filter-bar"><input type="date" value="${txnFilter.startDate}" onchange="txnFilter.startDate=this.value;render()"><input type="date" value="${txnFilter.endDate}" onchange="txnFilter.endDate=this.value;render()"><select onchange="txnFilter.projectId=this.value;render()"><option value="">All Sites</option>${projects.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select><select onchange="txnFilter.vendorId=this.value;render()"><option value="">All Vendors</option>${vendors.map(v=>`<option value="${v.id}">${v.name}</option>`).join('')}</select><select onchange="txnFilter.type=this.value;render()"><option value="">All</option><option value="credit">Credit</option><option value="debit">Debit</option></select><input type="text" placeholder="🔍 Search" value="${txnFilter.keyword}" oninput="txnFilter.keyword=this.value;render()"><button class="btn btn-sm" onclick="txnFilter={startDate:'',endDate:'',projectId:'',vendorId:'',type:'',keyword:''};render()">Reset</button></div><div class="flex-row"><button class="btn btn-green" onclick="txnModal()">➕ Add</button><button class="btn btn-red btn-sm" onclick="exportTxnPDF()">📄 PDF</button></div><div style="overflow-x:auto;background:#fff;border-radius:12px"><table><thead><tr><th>Date</th><th>Type</th><th>Credit</th><th>Debit</th><th>Site</th><th>Vendor</th><th>Receiver</th><th>Mode</th><th>Notes</th><th>Actions</th></tr></thead><tbody>${f.length?f.map(t=>`<tr><td>${t.date}</td><td><span class="badge ${t.type==='credit'?'badge-c':'badge-d'}">${t.type}</span></td><td style="text-align:right">${t.type==='credit'?fmt(t.amount):'-'}</td><td style="text-align:right">${t.type==='debit'?fmt(t.amount):'-'}</td><td>${projects.find(p=>p.id===t.project_id)?.name||(t.vendor_id?'Vendor':'-')}</td><td>${t.vendor_id?vendors.find(v=>v.id===t.vendor_id)?.name:'-'}</td><td>${t.receiver_name||'-'}</td><td>${t.payment_mode||'-'}</td><td>${t.notes||'-'}</td><td class="action-icons"><i class="fas fa-edit" onclick="event.stopPropagation();txnModal('${t.id}')"></i><i class="fas fa-trash-alt" onclick="event.stopPropagation();delTxn('${t.id}')"></i>${t.type==='credit'?`<button class="btn-receipt" onclick="event.stopPropagation();showReceiptForTxn('${t.id}')" title="Receipt">🧾</button>`:''}</td></tr>`).join('')+`<tr style="background:#f8fafd;font-weight:700"><td colspan="2">Total</td><td style="text-align:right;color:#16a34a">${fmt(cr)}</td><td style="text-align:right;color:#dc2626">${fmt(db)}</td><td colspan="6"></td></tr>`:'<tr><td colspan="10" style="text-align:center;padding:30px">No transactions</td></tr>'}</tbody></table></div>`}
function renderInventory(){const ui=getUniqueItems();let fl=ui;if(invTab==='low')fl=ui.filter(n=>getTotalStock(n)<=20&&getTotalStock(n)>0);if(invTab==='out')fl=ui.filter(n=>getTotalStock(n)===0);if(invFilter.keyword)fl=fl.filter(n=>n.toLowerCase().includes(invFilter.keyword.toLowerCase()));document.getElementById('content').innerHTML=`<h2>📦 Inventory</h2><div class="flex-row"><div class="tabs"><button class="tab-btn ${invTab==='all'?'active':''}" onclick="invTab='all';render()">All (${ui.length})</button><button class="tab-btn ${invTab==='low'?'active':''}" onclick="invTab='low';render()">⚠️ Low</button><button class="tab-btn ${invTab==='out'?'active':''}" onclick="invTab='out';render()">❌ Out</button></div><div style="display:flex;gap:6px"><button class="btn btn-green btn-sm" onclick="invModal()">➕ Add</button></div></div><div class="filter-bar"><input type="text" placeholder="🔍 Search" value="${invFilter.keyword}" oninput="invFilter.keyword=this.value;render()"><select onchange="invFilter.location=this.value;render()"><option value="">📍 All</option>${myLocations.map(s=>`<option>${s}</option>`).join('')}</select></div><div style="display:flex;flex-direction:column;gap:12px">${fl.length?fl.map(name=>{const t=getTotalStock(name),l=getItemLocs(name),sc=t===0?'#dc2626':t<=20?'#f59e0b':'#16a34a';return`<div class="item-card" onclick="showItemDetail('${name}')"><div class="item-header"><span class="item-name">📦 ${name}</span><span class="item-qty" style="color:${sc};border:2px solid ${sc}">${t===0?'❌ OUT OF STOCK':fmtNum(t)+' units'}</span></div><div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px">${l.map(lc=>{const s=getStockAt(name,lc);return`<span class="loc-chip ${s===0?'empty':''}" onclick="event.stopPropagation();showLocDetail('${lc}')">📍 ${lc}: ${s===0?'0':fmtNum(s)}</span>`}).join('')}</div></div>`}).join(''):'<div style="text-align:center;padding:40px">No items</div>'}</div>`}
function showItemDetail(name){selItem=name;const l=getItemLocs(name),t=getTotalStock(name),m=getMovements(name);document.getElementById('content').innerHTML=`<button class="btn" onclick="selItem=null;render()">← Back</button><div class="detail-header"><div class="detail-inner"><div><h2>📦 ${name}</h2><p style="color:#6183a0">${l.length} locs | ${m.length} moves</p></div><div class="bal-box"><div class="bal-label">Stock</div><div class="bal-val" style="color:${t===0?'#dc2626':t<=20?'#f59e0b':'#16a34a'}">${t===0?'❌ OUT':fmtNum(t)}</div></div></div></div>${t===0?`<div class="stock-info danger">⚠️ <b>OUT OF STOCK</b></div>`:''}<div class="flex-row"><div style="display:flex;gap:6px"><button class="btn btn-sm btn-green" onclick="invModal('${name}','stock')">➕ Add</button><button class="btn btn-sm btn-red" onclick="invModal('${name}','use')">➖ Use</button><button class="btn btn-sm btn-orange" onclick="invModal('${name}','transfer')">🚛 Move</button></div></div><div class="cards">${l.map(lc=>{const s=getStockAt(name,lc);return`<div class="card" onclick="showLocDetail('${lc}')"><div class="card-title">📍 ${lc}</div><div class="card-value" style="font-size:1.2rem">${s===0?'0':fmtNum(s)}</div></div>`}).join('')}</div><h3>📋 Movements</h3><div style="overflow-x:auto;background:#fff;border-radius:12px"><table><thead><tr><th>Date</th><th>Type</th><th>Qty</th><th>From</th><th>To</th></tr></thead><tbody>${m.map(x=>`<tr><td>${x.date}</td><td><span class="badge ${x.type==='add'?'badge-in':x.type==='use'?'badge-out':'badge-transfer'}">${x.type}</span></td><td>${x.quantity}</td><td>${x.from_location||'-'}</td><td>${x.to_location||'-'}</td></tr>`).join('')}</tbody></table></div>`}
function showLocDetail(loc){selLoc=loc;const it=invItems.filter(i=>i.location===loc);document.getElementById('content').innerHTML=`<button class="btn" onclick="selLoc=null;render()">← Back</button><div class="detail-header"><h2>📍 ${loc}</h2><p style="color:#6183a0">${it.length} items | ${fmtNum(it.reduce((s,i)=>s+i.quantity,0))} units</p></div><div class="cards">${it.map(i=>`<div class="card" onclick="showItemDetail('${i.name}')"><div class="card-title">📦 ${i.name}</div><div class="card-value" style="font-size:1.2rem">${fmtNum(i.quantity)} ${i.unit}</div></div>`).join('')}</div>`}

document.querySelectorAll('#mainApp .nav-link').forEach(l=>{l.addEventListener('click',()=>{prevView=currentView;currentView=l.dataset.view;siteId=null;vendorId=null;selItem=null;selLoc=null;document.querySelectorAll('#mainApp .nav-link').forEach(x=>x.classList.remove('active'));l.classList.add('active');render()})});
async function init(){const{data:{session}}=await sb.auth.getSession();if(session){document.getElementById('loginScreen').style.display='none';document.getElementById('mainApp').style.display='block';await loadData();render()}}
init();
</script>
</body>
</html>
