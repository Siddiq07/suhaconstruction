<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUHA Constructions | Site & Vendor Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:#f5f8fc;color:#1e2a3e}
        .nav{background:linear-gradient(135deg,#0b2b3b,#1e5f7a);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100}
        .logo-area{display:flex;align-items:center;gap:12px}
        .logo-icon{background:#f59e0b;width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:800}
        .logo-text h1{font-size:1.1rem;font-weight:800;color:#fff}.logo-text p{font-size:.65rem;color:#b8d4e3}
        .nav-links{display:flex;gap:5px;background:rgba(255,255,255,.1);padding:5px;border-radius:50px}
        .nav-link{padding:8px 20px;border-radius:40px;font-weight:600;font-size:.85rem;cursor:pointer;color:#e2e8f0;display:flex;align-items:center;gap:8px;transition:.3s}
        .nav-link:hover{background:rgba(255,255,255,.2)}.nav-link.active{background:#fff;color:#1e5f7a}
        .status{display:flex;align-items:center;gap:6px;font-size:.7rem;padding:5px 12px;border-radius:20px;color:#fff;background:rgba(34,197,94,.2)}.status b{color:#22c55e}
        .email-tag{color:#f59e0b;background:rgba(255,255,255,.15);padding:8px 18px;border-radius:40px;font-size:.75rem;display:flex;align-items:center;gap:6px}
        .main{padding:20px;max-width:1200px;margin:0 auto}
        .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px}
        .card{background:#fff;border-radius:16px;padding:18px;border:1px solid #e9edf2}.card:hover{transform:translateY(-2px);transition:.3s}
        .card-title{font-size:.65rem;font-weight:600;text-transform:uppercase;color:#6183a0;margin-bottom:6px}
        .card-value{font-size:1.6rem;font-weight:800;color:#1e5f7a}
        .btn{background:#1e5f7a;border:none;padding:8px 20px;border-radius:25px;color:#fff;font-weight:600;cursor:pointer;font-size:.8rem;display:inline-flex;align-items:center;gap:6px;transition:.3s}.btn:hover{background:#f59e0b}
        .btn-green{background:#16a34a}.btn-red{background:#dc2626}.btn-outline{background:transparent;border:2px solid #1e5f7a;color:#1e5f7a}.btn-outline:hover{background:#1e5f7a;color:#fff}
        .flex-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:16px}
        .sites-list{display:flex;flex-direction:column;gap:12px}
        .site-item{background:#fff;border-radius:14px;padding:16px;border:1px solid #e2edf2;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:.3s}
        .site-item:hover{transform:translateY(-2px);border-color:#f59e0b;box-shadow:0 6px 20px rgba(0,0,0,.08)}
        .site-info h3{font-size:1rem;font-weight:700;color:#1e5f7a;margin-bottom:3px}.site-info p{font-size:.7rem;color:#6183a0}
        .balance-tag{background:#eef2ff;padding:8px 16px;border-radius:25px;font-weight:700;font-size:.9rem}
        .detail-card{background:#fff;border-radius:16px;padding:20px;margin-bottom:16px;border:1px solid #e9edf2}
        .detail-inner{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:15px}
        .bal-box{background:#eef2ff;padding:12px 20px;border-radius:25px;text-align:center}
        .bal-label{font-size:.6rem;color:#6183a0;text-transform:uppercase;font-weight:600}
        .bal-val{font-size:1.2rem;font-weight:800}
        table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;font-size:.75rem}
        th,td{padding:10px;text-align:left;border-bottom:1px solid #eff3f6}
        th{background:#f8fafd;font-weight:700;color:#2c4b5c;text-transform:uppercase;font-size:.68rem}
        tr:hover{background:#f8fafd}
        .badge{padding:3px 10px;border-radius:20px;font-size:.65rem;font-weight:700;text-transform:uppercase;display:inline-block}
        .badge-c{background:#e0f2e9;color:#2b7e3a}.badge-d{background:#fee9e7;color:#dc2626}
        .action-icons i{cursor:pointer;color:#6c8d9c;margin:0 3px;transition:.2s}.action-icons i:hover{color:#f59e0b}
        .filter-bar{background:#fff;border-radius:12px;padding:10px;margin-bottom:14px;display:flex;flex-wrap:wrap;gap:8px;border:1px solid #e9edf2}
        .filter-bar input,.filter-bar select{padding:6px 10px;border-radius:18px;border:1px solid #cbd5e1;font-size:.72rem;min-width:100px}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);justify-content:center;align-items:center;z-index:1000}
        .modal-box{background:#fff;border-radius:18px;max-width:450px;width:90%;padding:22px;max-height:85vh;overflow-y:auto}
        .form-group{margin-bottom:12px}.form-group label{font-weight:600;display:block;margin-bottom:4px;font-size:.75rem}
        input,select,textarea{width:100%;padding:9px;border-radius:10px;border:1px solid #cbd5e1;font-size:.8rem;font-family:'Inter',sans-serif}input:focus,select:focus,textarea:focus{outline:none;border-color:#1e5f7a}
        textarea{min-height:60px;resize:vertical}
        .toast{position:fixed;bottom:20px;right:20px;background:#1e2a3e;color:#fff;padding:10px 20px;border-radius:25px;font-size:.8rem;z-index:2000;animation:slideIn .3s}@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
        @media(max-width:768px){.nav{flex-direction:column}.nav-link span{display:none}.nav-link{padding:8px 14px}}
    </style>
</head>
<body>
    <div class="nav">
        <div class="logo-area">
            <div class="logo-icon">S</div>
            <div class="logo-text"><h1>SUHA Constructions</h1><p>Builders & Developers</p></div>
        </div>
        <div class="nav-links">
            <div class="nav-link active" onclick="showTab('dashboard')"><i class="fas fa-chart-line"></i><span>Dashboard</span></div>
            <div class="nav-link" onclick="showTab('sites')"><i class="fas fa-building"></i><span>Sites</span></div>
            <div class="nav-link" onclick="showTab('vendors')"><i class="fas fa-truck"></i><span>Vendors</span></div>
            <div class="nav-link" onclick="showTab('transactions')"><i class="fas fa-receipt"></i><span>Transactions</span></div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
            <div class="status"><span style="color:#22c55e">●</span> <b>LIVE</b></div>
            <div class="email-tag"><i class="fas fa-envelope"></i>suhadesignbuilders@gmail.com</div>
        </div>
    </div>
    <div class="main" id="content"><div style="text-align:center;padding:60px;color:#6183a0">Loading...</div></div>

    <script>
        const sb = supabase.createClient('https://nfrhcacqjizdgkimraeq.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5mcmhjYWNxaml6ZGdraW1yYWVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNzkyNjIsImV4cCI6MjA5Mjk1NTI2Mn0.RY-Zg6uPz82d7d8kKtH-axioVT39-iQj1l_wbGWPKHI');
        let projects=[],vendors=[],transactions=[],currentTab='dashboard',selectedSite=null,selectedVendor=null;
        let filter={startDate:'',endDate:'',projectId:'',vendorId:'',type:'',keyword:''};

        function fmt(n){return'₹ '+Number(n).toLocaleString('en-IN')}
        function toast(m){const e=document.createElement('div');e.className='toast';e.textContent=m;document.body.appendChild(e);setTimeout(()=>e.remove(),2500)}

        async function loadData(){
            document.getElementById('content').innerHTML='<div style="text-align:center;padding:60px;color:#6183a0">Loading data...</div>';
            try{
                const[p,v,t]=await Promise.all([sb.from('project_balances').select('*').order('name'),sb.from('vendor_balances').select('*').order('name'),sb.from('transactions').select('*').order('date',{ascending:false})]);
                if(p.error||v.error||t.error){document.getElementById('content').innerHTML='<div style="text-align:center;padding:60px;color:#dc2626">❌ Error loading data. <button class="btn" onclick="loadData()">Retry</button></div>';return}
                projects=p.data||[];vendors=v.data||[];transactions=t.data||[];showTab('dashboard')
            }catch(e){document.getElementById('content').innerHTML='<div style="text-align:center;padding:60px;color:#dc2626">❌ Error: '+e.message+'</div>'}
        }

        function showTab(tab){
            currentTab=tab;selectedSite=null;selectedVendor=null;
            document.querySelectorAll('.nav-link').forEach((l,i)=>{l.classList.toggle('active',i===['dashboard','sites','vendors','transactions'].indexOf(tab))});
            if(tab==='dashboard')renderDashboard();else if(tab==='sites')renderSites();else if(tab==='vendors')renderVendors();else if(tab==='transactions')renderTransactions()
        }

        function modal(editId=null){
            const e=editId?transactions.find(x=>x.id===editId):null;
            const d=document.createElement('div');d.className='modal';d.style.display='flex';
            d.innerHTML=`<div class="modal-box"><h3 style="color:#1e5f7a;margin-bottom:14px">${e?'Edit':'New'} Transaction</h3>
            <div class="form-group"><label>Date</label><input id="md" type="date" value="${e?e.date:new Date().toISOString().slice(0,10)}"></div>
            <div class="form-group"><label>Type</label><select id="mt"><option value="credit" ${e?.type==='credit'?'selected':''}>💚 Credit</option><option value="debit" ${e?.type==='debit'?'selected':''}>🔴 Debit</option></select></div>
            <div class="form-group"><label>Amount (₹)</label><input id="ma" type="number" value="${e?e.amount:''}" min="1" placeholder="Amount"></div>
            <div class="form-group"><label>Site</label><select id="mp">${projects.map(p=>`<option value="${p.id}" ${(selectedSite===p.id||e?.project_id===p.id)?'selected':''}>${p.name}</option>`).join('')}</select></div>
            <div class="form-group"><label>Vendor</label><select id="mv"><option value="">None</option>${vendors.map(v=>`<option value="${v.id}" ${(selectedVendor===v.id||e?.vendor_id===v.id)?'selected':''}>${v.name}</option>`).join('')}</select></div>
            <div class="form-group"><label>Notes</label><textarea id="mn">${e?.notes||''}</textarea></div>
            <div style="display:flex;gap:10px;margin-top:14px"><button class="btn btn-green" id="ms" style="flex:1">Save</button><button class="btn-outline" id="mc" style="flex:1">Cancel</button></div></div>`;
            document.body.appendChild(d);
            d.querySelector('#mc').onclick=()=>d.remove();
            d.addEventListener('click',ev=>{if(ev.target===d)d.remove()});
            d.querySelector('#ms').onclick=async()=>{
                const data={date:d.querySelector('#md').value,type:d.querySelector('#mt').value,amount:parseFloat(d.querySelector('#ma').value),project_id:d.querySelector('#mp').value,vendor_id:d.querySelector('#mv').value||null,notes:d.querySelector('#mn').value};
                if(!data.date||isNaN(data.amount)||data.amount<=0||!data.project_id){toast('Fill all required fields');return}
                d.remove();
                if(e){await sb.from('transactions').update(data).eq('id',e.id);toast('Updated!')}
                else{await sb.from('transactions').insert([data]);toast('Added!')}
                loadData()
            }
        }

        async function deleteTxn(id){if(!confirm('Delete this transaction?'))return;await sb.from('transactions').delete().eq('id',id);toast('Deleted!');loadData()}
        async function addSite(){const n=prompt('Site Name:'),l=prompt('Location:');if(!n||!l)return;await sb.from('projects').insert([{name:n,location:l,start_date:new Date().toISOString().slice(0,10)}]);toast('Site added!');loadData()}
        async function addVendor(){const n=prompt('Vendor Name:');if(!n)return;await sb.from('vendors').insert([{name:n,phone:prompt('Phone:')||'',service:prompt('Service:')||'',address:prompt('Address:')||''}]);toast('Vendor added!');loadData()}

        function getFiltered(){
            let f=[...transactions];
            if(filter.startDate)f=f.filter(t=>t.date>=filter.startDate);
            if(filter.endDate)f=f.filter(t=>t.date<=filter.endDate);
            if(filter.projectId)f=f.filter(t=>t.project_id===filter.projectId);
            if(filter.vendorId)f=f.filter(t=>t.vendor_id===filter.vendorId);
            if(filter.type)f=f.filter(t=>t.type===filter.type);
            if(filter.keyword){const k=filter.keyword.toLowerCase();f=f.filter(t=>(t.notes&&t.notes.toLowerCase().includes(k))||(projects.find(p=>p.id===t.project_id)?.name?.toLowerCase().includes(k))||(t.vendor_id&&vendors.find(v=>v.id===t.vendor_id)?.name?.toLowerCase().includes(k)))}
            return f
        }

        function companyHdr(){return'<div style="text-align:center;margin-bottom:15px;padding-bottom:10px;border-bottom:2px solid #1e5f7a"><h2 style="color:#1e5f7a">SUHA Constructions</h2><p style="font-size:10px">Head: Pandith Complex, Kannangar, Padubidri - 574111</p><p style="font-size:10px">Branch: Whitestone Tower, Balmatta Rd, Mangalore - 575001</p><p style="font-size:10px">📞 +91 97403 04406 | suhadesignbuilders@gmail.com</p></div>'}

        // ===== PDF & EXCEL EXPORTS =====
        function exportFilteredPDF(){
            const filtered = getFiltered();
            const totalCredit = filtered.filter(t=>t.type==='credit').reduce((a,b)=>a+Number(b.amount),0);
            const totalDebit = filtered.filter(t=>t.type==='debit').reduce((a,b)=>a+Number(b.amount),0);
            
            const element = document.createElement('div');
            element.style.padding = '20px';
            element.style.fontFamily = 'Arial, sans-serif';
            
            let filterInfo = '';
            if(filter.startDate || filter.endDate || filter.projectId || filter.vendorId || filter.type){
                filterInfo = '<p style="text-align:center;font-size:10px;color:#666">Filters Applied: ';
                if(filter.startDate) filterInfo += 'From: '+filter.startDate+' ';
                if(filter.endDate) filterInfo += 'To: '+filter.endDate+' ';
                if(filter.projectId) filterInfo += '| Site: '+(projects.find(p=>p.id===filter.projectId)?.name||'')+' ';
                if(filter.vendorId) filterInfo += '| Vendor: '+(vendors.find(v=>v.id===filter.vendorId)?.name||'')+' ';
                if(filter.type) filterInfo += '| Type: '+filter.type;
                filterInfo += '</p>';
            }
            
            element.innerHTML = companyHdr() + `
                <h3 style="text-align:center;color:#1e5f7a">Filtered Transactions Report</h3>
                ${filterInfo}
                <p style="text-align:center;font-size:10px;color:#888">Generated: ${new Date().toLocaleString('en-IN')}</p>
                <div style="margin:10px 0;background:#f0f4f9;padding:8px;border-radius:8px;font-size:11px">
                    <strong>Total Credit:</strong> ${fmt(totalCredit)} &nbsp;|&nbsp; 
                    <strong>Total Debit:</strong> ${fmt(totalDebit)} &nbsp;|&nbsp; 
                    <strong>Net Balance:</strong> ${fmt(totalCredit - totalDebit)}
                </div>
                <table border="1" cellpadding="6" style="width:100%;border-collapse:collapse;font-size:10px">
                    <thead>
                        <tr style="background:#1e5f7a;color:white">
                            <th>Date</th><th>Type</th><th>Amount (₹)</th><th>Site</th><th>Vendor</th><th>Notes</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${filtered.map(t => `
                            <tr>
                                <td>${t.date}</td>
                                <td style="text-transform:uppercase">${t.type}</td>
                                <td style="text-align:right">${Number(t.amount).toLocaleString('en-IN')}</td>
                                <td>${projects.find(p=>p.id===t.project_id)?.name||'-'}</td>
                                <td>${t.vendor_id?vendors.find(v=>v.id===t.vendor_id)?.name:'-'}</td>
                                <td>${t.notes||''}</td>
                            </tr>
                        `).join('')}
                        <tr style="background:#f8fafd;font-weight:700">
                            <td colspan="2">Total</td>
                            <td style="text-align:right">${(totalCredit+totalDebit).toLocaleString('en-IN')}</td>
                            <td colspan="3"></td>
                        </tr>
                    </tbody>
                </table>`;
            
            const filename = filter.startDate || filter.endDate ? 
                `Transactions_${filter.startDate||'all'}_to_${filter.endDate||'all'}.pdf` :
                `All_Transactions_${new Date().toISOString().slice(0,10)}.pdf`;
            
            html2pdf().from(element).set({margin:0.4, filename:filename}).save();
            toast('📄 PDF downloaded!');
        }

        function exportFilteredExcel(){
            const filtered = getFiltered();
            const data = filtered.map(t => ({ 
                'Date': t.date,
                'Type': t.type.toUpperCase(),
                'Amount (₹)': Number(t.amount),
                'Site': projects.find(p=>p.id===t.project_id)?.name||'-',
                'Vendor': t.vendor_id?vendors.find(v=>v.id===t.vendor_id)?.name:'-',
                'Notes': t.notes||''
            }));
            
            // Add summary row
            const totalCredit = filtered.filter(t=>t.type==='credit').reduce((a,b)=>a+Number(b.amount),0);
            const totalDebit = filtered.filter(t=>t.type==='debit').reduce((a,b)=>a+Number(b.amount),0);
            data.push({
                'Date': 'TOTAL',
                'Type': '',
                'Amount (₹)': totalCredit + totalDebit,
                'Site': `Credit: ${totalCredit}`,
                'Vendor': `Debit: ${totalDebit}`,
                'Notes': `Balance: ${totalCredit - totalDebit}`
            });
            
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            const sheetName = filter.type ? `${filter.type}_Transactions` : 'Filtered_Transactions';
            XLSX.utils.book_append_sheet(wb, ws, sheetName.substring(0,31));
            
            const filename = filter.startDate ? 
                `Transactions_${filter.startDate}_to_${filter.endDate||filter.startDate}.xlsx` :
                `All_Transactions_${new Date().toISOString().slice(0,10)}.xlsx`;
            
            XLSX.writeFile(wb, filename);
            toast('📊 Excel downloaded!');
        }

        function exportSitePDF(id){
            const s=projects.find(p=>p.id===id);if(!s)return;
            const tx=transactions.filter(t=>t.project_id===id);
            const cr=Number(s.total_credit)||0,db=Number(s.total_debit)||0;
            const e=document.createElement('div');e.style.padding='20px';e.style.fontFamily='Arial, sans-serif';
            e.innerHTML=companyHdr()+`<h3 style="text-align:center;color:#1e5f7a">${s.name} - Statement</h3><p style="text-align:center">${s.location} | ${s.start_date}</p><div style="margin:10px 0;background:#f0f4f9;padding:8px;border-radius:8px;font-size:11px"><strong>Credit:</strong> ${fmt(cr)} | <strong>Debit:</strong> ${fmt(db)} | <strong>Balance:</strong> ${fmt(cr-db)}</div><table border="1" cellpadding="6" style="width:100%;border-collapse:collapse;font-size:10px"><tr style="background:#1e5f7a;color:white"><th>Date</th><th>Type</th><th>Amount</th><th>Vendor</th><th>Notes</th></tr>${tx.map(t=>`<tr><td>${t.date}</td><td style="text-transform:uppercase">${t.type}</td><td style="text-align:right">${Number(t.amount).toLocaleString('en-IN')}</td><td>${t.vendor_id?vendors.find(v=>v.id===t.vendor_id)?.name:'-'}</td><td>${t.notes||''}</td></tr>`).join('')}</table>`;html2pdf().from(e).set({margin:.5,filename:`${s.name}_Report.pdf`}).save();toast('📄 PDF downloaded!')}
        
        function exportSiteExcel(id){
            const s=projects.find(p=>p.id===id);if(!s)return;
            const d=transactions.filter(t=>t.project_id===id).map(t=>({Date:t.date,Type:t.type.toUpperCase(),'Amount (₹)':Number(t.amount),Vendor:t.vendor_id?vendors.find(v=>v.id===t.vendor_id)?.name:'-',Notes:t.notes||''}));
            const w=XLSX.utils.json_to_sheet(d),b=XLSX.utils.book_new();XLSX.utils.book_append_sheet(b,w,s.name.substring(0,31));XLSX.writeFile(b,`${s.name}.xlsx`);toast('📊 Excel downloaded!')
        }

        function exportVendorPDF(id){
            const v=vendors.find(x=>x.id===id);if(!v)return;
            const tx=transactions.filter(t=>t.vendor_id===id);
            const cr=Number(v.total_credit)||0,db=Number(v.total_debit)||0;
            const e=document.createElement('div');e.style.padding='20px';e.style.fontFamily='Arial, sans-serif';
            e.innerHTML=companyHdr()+`<h3 style="text-align:center;color:#1e5f7a">${v.name} - Statement</h3><p style="text-align:center">${v.service||''} | ${v.phone||''}</p><div style="margin:10px 0;background:#f0f4f9;padding:8px;border-radius:8px;font-size:11px"><strong>Credit:</strong> ${fmt(cr)} | <strong>Debit:</strong> ${fmt(db)} | <strong>Balance:</strong> ${fmt(cr-db)}</div><table border="1" cellpadding="6" style="width:100%;border-collapse:collapse;font-size:10px"><tr style="background:#1e5f7a;color:white"><th>Date</th><th>Site</th><th>Type</th><th>Amount</th><th>Notes</th></tr>${tx.map(t=>`<tr><td>${t.date}</td><td>${projects.find(p=>p.id===t.project_id)?.name||'-'}</td><td style="text-transform:uppercase">${t.type}</td><td style="text-align:right">${Number(t.amount).toLocaleString('en-IN')}</td><td>${t.notes||''}</td></tr>`).join('')}</table>`;html2pdf().from(e).set({margin:.5,filename:`${v.name}_Report.pdf`}).save();toast('📄 PDF downloaded!')}
        
        function exportVendorExcel(id){
            const v=vendors.find(x=>x.id===id);if(!v)return;
            const d=transactions.filter(t=>t.vendor_id===id).map(t=>({Date:t.date,Site:projects.find(p=>p.id===t.project_id)?.name||'-',Type:t.type.toUpperCase(),'Amount (₹)':Number(t.amount),Notes:t.notes||''}));
            const w=XLSX.utils.json_to_sheet(d),b=XLSX.utils.book_new();XLSX.utils.book_append_sheet(b,w,v.name.substring(0,31));XLSX.writeFile(b,`${v.name}.xlsx`);toast('📊 Excel downloaded!')
        }

        function renderDashboard(){
            let cr=0,db=0;transactions.forEach(t=>{if(t.type==='credit')cr+=Number(t.amount);else db+=Number(t.amount)});
            document.getElementById('content').innerHTML=`
            <h2 style="margin-bottom:16px">📊 Dashboard</h2>
            <div class="cards">
                <div class="card"><div class="card-title">Total Sites</div><div class="card-value">${projects.length}</div></div>
                <div class="card"><div class="card-title">Vendors</div><div class="card-value">${vendors.length}</div></div>
                <div class="card"><div class="card-title">Transactions</div><div class="card-value">${transactions.length}</div></div>
                <div class="card"><div class="card-title">Net Balance</div><div class="card-value" style="color:${cr-db>=0?'#16a34a':'#dc2626'}">${fmt(cr-db)}</div></div>
            </div>
            <div class="flex-row"><button class="btn btn-green" onclick="modal()">➕ Add Transaction</button></div>
            <div class="cards">
                <div class="card"><div class="card-title" style="color:#16a34a">Total Credits</div><div class="card-value" style="color:#16a34a">${fmt(cr)}</div></div>
                <div class="card"><div class="card-title" style="color:#dc2626">Total Debits</div><div class="card-value" style="color:#dc2626">${fmt(db)}</div></div>
            </div>`
        }

        function renderSites(){
            document.getElementById('content').innerHTML=`
            <h2 style="margin-bottom:16px">🏗️ Sites</h2>
            <div class="flex-row"><button class="btn" onclick="addSite()">➕ Add Site</button><button class="btn btn-green" onclick="modal()">➕ Add Transaction</button></div>
            <div class="sites-list">${projects.length?projects.map(p=>`<div class="site-item" onclick="openSite('${p.id}')"><div class="site-info"><h3>${p.name}</h3><p>📍 ${p.location} | 📅 ${p.start_date}</p></div><div class="balance-tag" style="color:${(p.balance||0)>=0?'#16a34a':'#dc2626'}">${fmt(p.balance||0)}</div></div>`).join(''):'<div style="text-align:center;padding:40px;color:#6183a0">No sites yet</div>'}</div>`
        }

        function openSite(id){
            selectedSite=id;const s=projects.find(p=>p.id===id);if(!s)return;
            const tx=transactions.filter(t=>t.project_id===id),cr=Number(s.total_credit)||0,db=Number(s.total_debit)||0,bal=cr-db;
            document.getElementById('content').innerHTML=`
            <button class="btn" onclick="showTab('sites')" style="margin-bottom:14px">← Back to Sites</button>
            <div class="detail-card"><div class="detail-inner"><div><h2 style="color:#1e5f7a">${s.name}</h2><p style="color:#6183a0">📍 ${s.location} | 📅 ${s.start_date}</p></div><div class="bal-box"><div class="bal-label">Balance</div><div class="bal-val" style="color:${bal>=0?'#16a34a':'#dc2626'}">${fmt(bal)}</div></div></div></div>
            <div class="flex-row"><button class="btn btn-green" onclick="modal()">➕ Add Transaction</button><div style="display:flex;gap:8px"><button class="btn btn-red" onclick="exportSitePDF('${id}')">📄 PDF</button><button class="btn" style="background:#16a34a" onclick="exportSiteExcel('${id}')">📊 Excel</button></div></div>
            <div class="cards"><div class="card"><div class="card-title" style="color:#16a34a">Credit</div><div class="card-value" style="color:#16a34a;font-size:1.3rem">${fmt(cr)}</div></div><div class="card"><div class="card-title" style="color:#dc2626">Debit</div><div class="card-value" style="color:#dc2626;font-size:1.3rem">${fmt(db)}</div></div></div>
            ${tx.length?`<div style="overflow-x:auto;background:#fff;border-radius:12px"><table><thead><tr><th>Date</th><th>Type</th><th>Credit</th><th>Debit</th><th>Vendor</th><th>Notes</th><th>Actions</th></tr></thead><tbody>${tx.map(t=>`<tr><td>${t.date}</td><td><span class="badge ${t.type==='credit'?'badge-c':'badge-d'}">${t.type}</span></td><td style="text-align:right">${t.type==='credit'?fmt(t.amount):'-'}</td><td style="text-align:right">${t.type==='debit'?fmt(t.amount):'-'}</td><td>${t.vendor_id?vendors.find(v=>v.id===t.vendor_id)?.name:'-'}</td><td>${t.notes||'-'}</td><td class="action-icons"><i class="fas fa-edit" onclick="event.stopPropagation();modal('${t.id}')"></i><i class="fas fa-trash-alt" onclick="event.stopPropagation();deleteTxn('${t.id}')"></i></td></tr>`).join('')}<tr style="background:#f8fafd;font-weight:700;border-top:2px solid #1e5f7a"><td colspan="2">Total</td><td style="text-align:right;color:#16a34a">${fmt(cr)}</td><td style="text-align:right;color:#dc2626">${fmt(db)}</td><td colspan="3"></td></tr></tbody></table></div>`:'<p style="text-align:center;padding:40px;color:#6183a0">No transactions yet</p>'}`
        }

        function renderVendors(){
            document.getElementById('content').innerHTML=`
            <h2 style="margin-bottom:16px">🚛 Vendors</h2>
            <div class="flex-row"><button class="btn" onclick="addVendor()">➕ Add Vendor</button><button class="btn btn-green" onclick="modal()">➕ Add Transaction</button></div>
            <div class="sites-list">${vendors.length?vendors.map(v=>`<div class="site-item" onclick="openVendor('${v.id}')"><div class="site-info"><h3>${v.name}</h3><p>${v.service||'Supplier'} | 📞 ${v.phone||'N/A'}</p></div><div class="balance-tag" style="color:${(v.balance||0)>=0?'#16a34a':'#dc2626'}">${fmt(v.balance||0)}</div></div>`).join(''):'<div style="text-align:center;padding:40px;color:#6183a0">No vendors yet</div>'}</div>`
        }

        function openVendor(id){
            selectedVendor=id;const v=vendors.find(x=>x.id===id);if(!v)return;
            const tx=transactions.filter(t=>t.vendor_id===id),cr=Number(v.total_credit)||0,db=Number(v.total_debit)||0,bal=cr-db;
            document.getElementById('content').innerHTML=`
            <button class="btn" onclick="showTab('vendors')" style="margin-bottom:14px">← Back to Vendors</button>
            <div class="detail-card"><div class="detail-inner"><div><h2 style="color:#1e5f7a">${v.name}</h2><p style="color:#6183a0">${v.service||'Supplier'} | 📞 ${v.phone||'N/A'}</p></div><div class="bal-box"><div class="bal-label">Balance</div><div class="bal-val" style="color:${bal>=0?'#16a34a':'#dc2626'}">${fmt(bal)}</div></div></div></div>
            <div class="flex-row"><button class="btn btn-green" onclick="modal()">➕ Add Transaction</button><div style="display:flex;gap:8px"><button class="btn btn-red" onclick="exportVendorPDF('${id}')">📄 PDF</button><button class="btn" style="background:#16a34a" onclick="exportVendorExcel('${id}')">📊 Excel</button></div></div>
            <div class="cards"><div class="card"><div class="card-title" style="color:#16a34a">Credit</div><div class="card-value" style="color:#16a34a;font-size:1.3rem">${fmt(cr)}</div></div><div class="card"><div class="card-title" style="color:#dc2626">Debit</div><div class="card-value" style="color:#dc2626;font-size:1.3rem">${fmt(db)}</div></div></div>
            ${tx.length?`<div style="overflow-x:auto;background:#fff;border-radius:12px"><table><thead><tr><th>Date</th><th>Site</th><th>Type</th><th>Credit</th><th>Debit</th><th>Notes</th><th>Actions</th></tr></thead><tbody>${tx.map(t=>`<tr><td>${t.date}</td><td>${projects.find(p=>p.id===t.project_id)?.name||'-'}</td><td><span class="badge ${t.type==='credit'?'badge-c':'badge-d'}">${t.type}</span></td><td style="text-align:right">${t.type==='credit'?fmt(t.amount):'-'}</td><td style="text-align:right">${t.type==='debit'?fmt(t.amount):'-'}</td><td>${t.notes||'-'}</td><td class="action-icons"><i class="fas fa-edit" onclick="event.stopPropagation();modal('${t.id}')"></i><i class="fas fa-trash-alt" onclick="event.stopPropagation();deleteTxn('${t.id}')"></i></td></tr>`).join('')}<tr style="background:#f8fafd;font-weight:700;border-top:2px solid #1e5f7a"><td colspan="3">Total</td><td style="text-align:right;color:#16a34a">${fmt(cr)}</td><td style="text-align:right;color:#dc2626">${fmt(db)}</td><td colspan="2"></td></tr></tbody></table></div>`:'<p style="text-align:center;padding:40px;color:#6183a0">No transactions yet</p>'}`
        }

        function renderTransactions(){
            const f=getFiltered(),cr=f.filter(t=>t.type==='credit').reduce((a,b)=>a+Number(b.amount),0),db=f.filter(t=>t.type==='debit').reduce((a,b)=>a+Number(b.amount),0);
            document.getElementById('content').innerHTML=`
            <h2 style="margin-bottom:16px">💳 All Transactions</h2>
            <div class="filter-bar">
                <input type="date" id="fs" value="${filter.startDate}" title="From Date">
                <input type="date" id="fe" value="${filter.endDate}" title="To Date">
                <select id="fp"><option value="">All Sites</option>${projects.map(p=>`<option value="${p.id}" ${filter.projectId===p.id?'selected':''}>${p.name}</option>`).join('')}</select>
                <select id="fv"><option value="">All Vendors</option>${vendors.map(v=>`<option value="${v.id}" ${filter.vendorId===v.id?'selected':''}>${v.name}</option>`).join('')}</select>
                <select id="ft"><option value="" ${!filter.type?'selected':''}>All Types</option><option value="credit" ${filter.type==='credit'?'selected':''}>Credit</option><option value="debit" ${filter.type==='debit'?'selected':''}>Debit</option></select>
                <input type="text" id="fk" placeholder="🔍 Search" value="${filter.keyword}">
                <button class="btn" onclick="applyFilter()">Apply</button>
                <button class="btn-outline" onclick="resetFilter()">Reset</button>
            </div>
            <div class="flex-row">
                <button class="btn btn-green" onclick="modal()">➕ Add Transaction</button>
                <div style="display:flex;gap:8px">
                    <button class="btn btn-red" onclick="exportFilteredPDF()">📄 Export PDF</button>
                    <button class="btn" style="background:#16a34a" onclick="exportFilteredExcel()">📊 Export Excel</button>
                </div>
            </div>
            <div class="cards">
                <div class="card"><div class="card-title" style="color:#16a34a">Filtered Credits</div><div class="card-value" style="color:#16a34a;font-size:1.3rem">${fmt(cr)}</div></div>
                <div class="card"><div class="card-title" style="color:#dc2626">Filtered Debits</div><div class="card-value" style="color:#dc2626;font-size:1.3rem">${fmt(db)}</div></div>
                <div class="card"><div class="card-title">Net (Filtered)</div><div class="card-value" style="color:${cr-db>=0?'#16a34a':'#dc2626'};font-size:1.3rem">${fmt(cr-db)}</div></div>
                <div class="card"><div class="card-title">Records</div><div class="card-value" style="font-size:1.3rem">${f.length}</div></div>
            </div>
            ${f.length?`<div style="overflow-x:auto;background:#fff;border-radius:12px"><table><thead><tr><th>Date</th><th>Type</th><th>Credit</th><th>Debit</th><th>Site</th><th>Vendor</th><th>Notes</th><th>Actions</th></tr></thead><tbody>${f.map(t=>`<tr><td>${t.date}</td><td><span class="badge ${t.type==='credit'?'badge-c':'badge-d'}">${t.type}</span></td><td style="text-align:right">${t.type==='credit'?fmt(t.amount):'-'}</td><td style="text-align:right">${t.type==='debit'?fmt(t.amount):'-'}</td><td>${projects.find(p=>p.id===t.project_id)?.name||'-'}</td><td>${t.vendor_id?vendors.find(v=>v.id===t.vendor_id)?.name:'-'}</td><td>${t.notes||'-'}</td><td class="action-icons"><i class="fas fa-edit" onclick="event.stopPropagation();modal('${t.id}')"></i><i class="fas fa-trash-alt" onclick="event.stopPropagation();deleteTxn('${t.id}')"></i></td></tr>`).join('')}<tr style="background:#f8fafd;font-weight:700;border-top:2px solid #1e5f7a"><td colspan="2">Total</td><td style="text-align:right;color:#16a34a">${fmt(cr)}</td><td style="text-align:right;color:#dc2626">${fmt(db)}</td><td colspan="4"></td></tr></tbody></table></div>`:'<p style="text-align:center;padding:40px;color:#6183a0">No transactions found</p>'}`
        }

        function applyFilter(){filter={startDate:document.getElementById('fs').value,endDate:document.getElementById('fe').value,projectId:document.getElementById('fp').value,vendorId:document.getElementById('fv').value,type:document.getElementById('ft').value,keyword:document.getElementById('fk').value};renderTransactions()}
        function resetFilter(){filter={startDate:'',endDate:'',projectId:'',vendorId:'',type:'',keyword:''};renderTransactions()}

        loadData()
    </script>
</body>
</html>
