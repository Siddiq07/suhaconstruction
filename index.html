<script>

const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5mcmhjYWNxaml6ZGdraW1yYWVxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNzkyNjIsImV4cCI6MjA5Mjk1NTI2Mn0.RY-Zg6uPz82d7d8kKtH-axioVT39-iQj1l_wbGWPKHI';
const sb=supabase.createClient(SB_URL,SB_KEY);

function toast(m){const e=document.createElement('div');e.className='toast';e.textContent=m;document.body.appendChild(e);setTimeout(()=>{e.style.opacity='0';e.style.transition='opacity .3s';setTimeout(()=>e.remove(),300)},2000)}

// ===== AUTH WITH SESSION STORAGE (Auto Logout) =====
async function doLogin(){
    const e=document.getElementById('loginEmail').value.trim(),p=document.getElementById('loginPass').value;
    const er=document.getElementById('loginError'),info=document.getElementById('loginInfo');
    er.style.display='none';info.style.display='none';
    if(!e||!p){er.textContent='Enter email and password';er.style.display='block';return}
    const{data,error}=await sb.auth.signInWithPassword({email:e,password:p});
    if(error){er.textContent='❌ '+error.message;er.style.display='block'}
    else{sessionStorage.setItem('suha_logged_in','true');sessionStorage.setItem('suha_login_time',Date.now().toString());showApp()}
}
async function showApp(){document.getElementById('loginScreen').style.display='none';document.getElementById('mainApp').style.display='block';await loadData();render()}
async function doLogout(){await sb.auth.signOut();sessionStorage.clear();document.getElementById('mainApp').style.display='none';document.getElementById('loginScreen').style.display='flex';document.getElementById('loginPass').value=''}
function isSessionValid(){const li=sessionStorage.getItem('suha_logged_in');if(!li)return false;const lt=parseInt(sessionStorage.getItem('suha_login_time')||'0');const now=Date.now();if(now-lt>12*60*60*1000){sessionStorage.clear();return false}return true}

// Auto logout when hidden
document.addEventListener('visibilitychange',()=>{if(document.hidden){sessionStorage.setItem('suha_hidden_time',Date.now().toString())}else{const ht=parseInt(sessionStorage.getItem('suha_hidden_time')||'0');if(ht>0&&(Date.now()-ht>30000)){doLogout();toast('🔒 Auto-logged out for security')}}});
window.addEventListener('beforeunload',()=>{sessionStorage.setItem('suha_closing','true')});

// ===== BIOMETRIC =====
async function checkBiometricSupport(){if(!window.PublicKeyCredential)return false;try{const a=await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();biometricSupported=a;if(a){document.getElementById('bioRegisterBtn').style.display='flex';if(localStorage.getItem('suha_bio_registered')==='true'){biometricRegistered=true;document.getElementById('bioLoginBtn').style.display='flex';document.getElementById('bioRegisterBtn').style.display='none'}}return a}catch(e){return false}}
async function registerBiometric(){if(!biometricSupported){toast('❌ Not supported');return}const email=document.getElementById('loginEmail').value.trim();if(!email){toast('Enter email first');return}try{const ch=new Uint8Array(32);crypto.getRandomValues(ch);const enc=new TextEncoder();const cred=await navigator.credentials.create({publicKey:{challenge:ch,rp:{name:'SUHA Constructions',id:new URL(window.location.href).hostname},user:{id:enc.encode(email),name:email,displayName:email},pubKeyCredParams:[{type:'public-key',alg:-7}],authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required',residentKey:'required'},timeout:60000,attestation:'none'}});const cid=btoa(String.fromCharCode(...new Uint8Array(cred.rawId)));localStorage.setItem('suha_bio_email',email);localStorage.setItem('suha_bio_credential',cid);localStorage.setItem('suha_bio_registered','true');biometricRegistered=true;document.getElementById('bioLoginBtn').style.display='flex';document.getElementById('bioRegisterBtn').style.display='none';document.getElementById('loginInfo').textContent='✅ Fingerprint registered!';document.getElementById('loginInfo').style.display='block';toast('✅ Fingerprint registered!')}catch(err){toast('❌ Registration failed')}}
async function biometricLogin(){if(!biometricSupported){toast('❌ Not supported');return}if(!biometricRegistered){await registerBiometric();return}const email=localStorage.getItem('suha_bio_email');const cid=localStorage.getItem('suha_bio_credential');if(!email||!cid){toast('⚠️ Register first');return}try{const ch=new Uint8Array(32);crypto.getRandomValues(ch);const cred=await navigator.credentials.get({publicKey:{challenge:ch,allowCredentials:[{id:Uint8Array.from(atob(cid),c=>c.charCodeAt(0)),type:'public-key',transports:['internal']}],timeout:60000,userVerification:'required'}});if(cred){document.getElementById('loginEmail').value=email;const{data:al}=await sb.from('allowed_users').select('email').eq('email',email).single();if(!al){toast('⛔ Access Denied');return}sessionStorage.setItem('suha_logged_in','true');sessionStorage.setItem('suha_login_time',Date.now().toString());await showApp();toast('✅ Biometric login!')}}catch(err){toast('❌ Biometric failed. Use password.')}}

// ===== DATA =====
async function loadData(){const[p,v,t,i,m]=await Promise.all([sb.from('projects').select('*').order('name'),sb.from('vendors').select('*').order('name'),sb.from('transactions').select('*').order('date',{ascending:false}),sb.from('inventory_items').select('*').order('name'),sb.from('inventory_movements').select('*').order('date',{ascending:false})]);projects=p.data||[];vendors=v.data||[];transactions=t.data||[];invItems=i.data||[];invMoves=m.data||[];if(!projects.length)projects=[{id:'p1',name:'Lakeside Greens',location:'Padubidri',start_date:'2025-01-10'},{id:'p2',name:'Palm Heights',location:'Kannangar',start_date:'2025-03-05'},{id:'p3',name:'SUHA Corporate Park',location:'Mangalore',start_date:'2025-08-20'}];if(!vendors.length)vendors=[{id:'v1',name:'Mahadev Cement Works',phone:'9876543210',service:'Cement Supply'},{id:'v2',name:'Sai Steel Industries',phone:'9988766550',service:'TMT Steel'},{id:'v3',name:'Rockland Earthmovers',phone:'9123456789',service:'Heavy Equipment'}];buildBalanceCache();}
function buildBalanceCache(){balanceCache={};transactions.forEach(t=>{const key=`${t.project_id||'none'}_${t.vendor_id||'none'}`;if(!balanceCache[key])balanceCache[key]={credit:0,debit:0};if(t.type==='credit')balanceCache[key].credit+=Number(t.amount);else balanceCache[key].debit+=Number(t.amount);});}
function getBalance(siteId,vendorId){const key=`${siteId||'none'}_${vendorId||'none'}`;const b=balanceCache[key]||{credit:0,debit:0};return b.credit-b.debit}
function getSiteTotalBalance(siteId){let bal=0;vendors.forEach(v=>{bal+=getBalance(siteId,v.id)});return bal}
function getVendorTotalBalance(vendorId){let bal=0;projects.forEach(p=>{bal+=getBalance(p.id,vendorId)});return bal}
function getSiteOnlyBalance(siteId){const cr=transactions.filter(t=>t.project_id===siteId&&t.type==='credit').reduce((s,t)=>s+Number(t.amount),0);const db=transactions.filter(t=>t.project_id===siteId&&t.type==='debit').reduce((s,t)=>s+Number(t.amount),0);return cr-db}
function getUniqueItems(){return[...new Set(invItems.map(i=>i.name))]}
function getItemLocs(name){return invItems.filter(i=>i.name===name).map(i=>i.location)}
function getStockAt(name,loc){const i=invItems.find(x=>x.name===name&&x.location===loc);return i?i.quantity:0}
function getTotalStock(name){return invItems.filter(i=>i.name===name).reduce((s,i)=>s+i.quantity,0)}
function getMovements(name){return invMoves.filter(m=>m.item_name===name).sort((a,b)=>new Date(b.date)-new Date(a.date))}
function getFilteredTxns(){let f=[...transactions];if(txnFilter.startDate)f=f.filter(t=>t.date>=txnFilter.startDate);if(txnFilter.endDate)f=f.filter(t=>t.date<=txnFilter.endDate);if(txnFilter.projectId)f=f.filter(t=>t.project_id===txnFilter.projectId);if(txnFilter.vendorId)f=f.filter(t=>t.vendor_id===txnFilter.vendorId);if(txnFilter.type)f=f.filter(t=>t.type===txnFilter.type);if(txnFilter.keyword){const k=txnFilter.keyword.toLowerCase();f=f.filter(t=>(t.notes&&t.notes.toLowerCase().includes(k))||(t.receiver_name&&t.receiver_name.toLowerCase().includes(k))||(t.bill_no&&t.bill_no.toLowerCase().includes(k)))}return f}
function getRunningBalances(txns){let running=0;return txns.map(t=>{if(t.type==='credit')running+=Number(t.amount);else running-=Number(t.amount);return{...t,runningBalance:running};});}

function numberToWords(num){
    const ones=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
    const tens=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
    if(num==0)return'Zero';
    function convert(n){if(n<20)return ones[n];if(n<100)return tens[Math.floor(n/10)]+(n%10?' '+ones[n%10]:'');if(n<1000)return ones[Math.floor(n/100)]+' Hundred'+(n%100?' and '+convert(n%100):'');if(n<100000)return convert(Math.floor(n/1000))+' Thousand'+(n%1000?' '+convert(n%1000):'');if(n<10000000)return convert(Math.floor(n/100000))+' Lakh'+(n%100000?' '+convert(n%100000):'');return convert(Math.floor(n/10000000))+' Crore'+(n%10000000?' '+convert(n%10000000):'')}
    return convert(Math.floor(num));
}

function invModal(name=null,action='add'){let t='',c='';const lo=myLocations.map(s=>`<option>${s}</option>`).join('');const ls=(id)=>`<select id="${id}">${lo}</select><span class="add-loc-link" onclick="addLocationPopup((loc)=>{const s=document.getElementById('${id}');const o=document.createElement('option');o.text=loc;o.selected=true;s.appendChild(o)})">+ Add</span>`;if(action==='add'){t='Add New Item';c=`<div class="form-group"><label>Item Name <span class="req">*</span></label><input id="iname" value="${name||''}"></div><div class="form-group"><label>Quantity <span class="req">*</span></label><input id="iqty" type="number" min="1" value="1"></div><div class="form-group"><label>Location <span class="req">*</span></label>${ls('iloc')}</div><div class="form-group"><label>Vendor <span class="req">*</span></label><select id="ivendor"><option value="">Select</option>${vendors.map(v=>`<option value="${v.name}">${v.name}</option>`).join('')}</select></div><div class="form-group"><label>Unit</label><select id="iunit"><option>Bags</option><option>Tonnes</option><option>Pieces</option><option>Kg</option><option>Units</option></select></div><div class="form-group"><label>Min Stock</label><input id="imin" type="number" min="0" value="10"></div><div class="form-group"><label>Notes</label><textarea id="notes"></textarea></div>`}else if(action==='stock'){t=`Add Stock - ${name}`;c=`<div class="stock-info">📦 ${name}: <b>${fmtNum(getTotalStock(name))}</b> total</div><div class="form-group"><label>Location <span class="req">*</span></label>${ls('aloc')}</div><div class="form-group"><label>Quantity <span class="req">*</span></label><input id="aqty" type="number" min="1" value="10" autofocus></div><div class="form-group"><label>Vendor <span class="req">*</span></label><select id="avendor"><option value="">Select</option>${vendors.map(v=>`<option value="${v.name}">${v.name}</option>`).join('')}</select></div><div class="form-group"><label>Notes</label><textarea id="notes"></textarea></div>`}else if(action==='use'){const locs=getItemLocs(name);const av=locs.length?locs.map(l=>`<b>${l}</b>: ${getStockAt(name,l)}`).join(' | '):'No stock!';t=`Use Stock - ${name}`;c=`<div class="stock-info">Available: ${av}</div><div class="form-group"><label>From <span class="req">*</span></label><select id="uloc">${locs.length?locs.map(l=>`<option>${l}</option>`).join(''):'<option>No locations</option>'}</select></div><div class="form-group"><label>Quantity <span class="req">*</span></label><input id="uqty" type="number" min="1" value="1" autofocus></div><div class="form-group"><label>Used At <span class="req">*</span></label>${ls('usite')}</div><div class="form-group"><label>Notes</label><textarea id="notes"></textarea></div>`}else{const locs=getItemLocs(name);const av=locs.length?locs.map(l=>`<b>${l}</b>: ${getStockAt(name,l)}`).join(' | '):'No stock!';t=`Transfer - ${name}`;c=`<div class="stock-info">Available: ${av}</div><div class="form-group"><label>From <span class="req">*</span></label><select id="tfrom">${locs.length?locs.map(l=>`<option>${l}</option>`).join(''):'<option>No locations</option>'}</select></div><div class="form-group"><label>Quantity <span class="req">*</span></label><input id="tqty" type="number" min="1" value="1" autofocus></div><div class="form-group"><label>To <span class="req">*</span></label>${ls('tto')}</div><div class="form-group"><label>Notes</label><textarea id="notes"></textarea></div>`}showModal(t,c,async(m)=>{if(action==='add'){const nm=m.querySelector('#iname').value.trim(),q=parseInt(m.querySelector('#iqty').value),l=m.querySelector('#iloc').value,u=m.querySelector('#iunit').value,min=parseInt(m.querySelector('#imin').value),ven=m.querySelector('#ivendor').value;if(!nm||!q||!l||!ven){toast('Fill fields');return false}const ex=invItems.find(i=>i.name===nm&&i.location===l);if(ex)ex.quantity+=q;else invItems.push({id:'i'+Date.now(),name:nm,quantity:q,location:l,unit:u,min_stock:min,vendor:ven});invMoves.push({id:'m'+Date.now(),item_name:nm,type:'add',quantity:q,to_location:l,date:new Date().toISOString().slice(0,10)});}else if(action==='stock'){const l=m.querySelector('#aloc').value,q=parseInt(m.querySelector('#aqty').value),ven=m.querySelector('#avendor').value;if(!q||!ven){toast('Fill fields');return false}const ex=invItems.find(i=>i.name===name&&i.location===l);if(ex)ex.quantity+=q;else invItems.push({id:'i'+Date.now(),name,quantity:q,location:l,unit:'Units',min_stock:10,vendor:ven});invMoves.push({id:'m'+Date.now(),item_name:name,type:'add',quantity:q,to_location:l,date:new Date().toISOString().slice(0,10)});}else if(action==='use'){const l=m.querySelector('#uloc').value,q=parseInt(m.querySelector('#uqty').value),s=m.querySelector('#usite').value,st=getStockAt(name,l);if(!l||!q||q>st){toast('Invalid');return false}const ex=invItems.find(i=>i.name===name&&i.location===l);if(ex){ex.quantity-=q;if(ex.quantity<=0)ex.quantity=0}invMoves.push({id:'m'+Date.now(),item_name:name,type:'use',quantity:q,from_location:l,to_location:s,date:new Date().toISOString().slice(0,10)});}else{const f=m.querySelector('#tfrom').value,q=parseInt(m.querySelector('#tqty').value),to=m.querySelector('#tto').value,st=getStockAt(name,f);if(!f||!q||q>st||f===to){toast('Invalid');return false}const fi=invItems.find(i=>i.name===name&&i.location===f);if(fi){fi.quantity-=q;if(fi.quantity<=0)fi.quantity=0}const ti=invItems.find(i=>i.name===name&&i.location===to);if(ti)ti.quantity+=q;else invItems.push({id:'i'+Date.now(),name,quantity:q,location:to,unit:fi?.unit||'Units',min_stock:10});invMoves.push({id:'m'+Date.now(),item_name:name,type:'transfer',quantity:q,from_location:f,to_location:to,date:new Date().toISOString().slice(0,10)});}render();toast('Done!')})}
async function delTxn(id){if(!confirm('Delete?'))return;await sb.from('transactions').delete().eq('id',id);await loadData();buildBalanceCache();toast('Deleted!');render()}

// RENDER
function render(){buildBalanceCache();if(currentView==='dashboard')renderDashboard();else if(currentView==='sites')siteId?renderSiteDetail():renderSites();else if(currentView==='vendors')vendorId?renderVendorDetail():renderVendors();else if(currentView==='transactions')renderTransactions();else if(currentView==='inventory'){if(selItem)showItemDetail(selItem);else if(selLoc)showLocDetail(selLoc);else renderInventory()}}

function renderDashboard(){let cr=0,db=0;transactions.forEach(t=>{if(t.type==='credit')cr+=Number(t.amount);else db+=Number(t.amount)});document.getElementById('content').innerHTML=`<h2 style="margin-bottom:16px">📊 Dashboard</h2><div class="cards"><div class="card" onclick="currentView='sites';render()"><div class="card-title">🏗️ Sites</div><div class="card-value">${projects.length}</div></div><div class="card" onclick="currentView='vendors';render()"><div class="card-title">🚛 Vendors</div><div class="card-value">${vendors.length}</div></div><div class="card" onclick="currentView='transactions';render()"><div class="card-title">💳 Transactions</div><div class="card-value">${transactions.length}</div></div><div class="card" onclick="currentView='inventory';render()"><div class="card-title">📦 Items</div><div class="card-value">${getUniqueItems().length}</div></div><div class="card"><div class="card-title">💰 Net Balance</div><div class="card-value" style="color:${cr-db>=0?'#16a34a':'#dc2626'}">${fmt(cr-db)}</div></div></div><div class="flex-row"><button class="btn btn-green" onclick="txnModal()">➕ Transaction</button><button class="btn btn-orange" onclick="invModal()">➕ Add Item</button></div>`}
function renderSites(){document.getElementById('content').innerHTML=`<h2 style="margin-bottom:16px">🏗️ Sites</h2><div class="flex-row"><button class="btn" onclick="addSiteModal()">➕ Add Site</button></div><div style="display:flex;flex-direction:column;gap:12px">${projects.map(p=>{const bal=getSiteOnlyBalance(p.id);return`<div class="item-card" onclick="siteId='${p.id}';render()"><div class="item-header"><span class="item-name">🏗️ ${p.name}</span><span class="item-qty" style="color:${bal>=0?'#16a34a':'#dc2626'}">${fmt(bal)}</span></div><div style="font-size:.7rem;color:#6183a0">📍 ${p.location} | 📅 ${fmtDate(p.start_date)}</div></div>`}).join('')||'<div style="text-align:center;padding:40px">No sites</div>'}</div>`}
function renderSiteDetail(){const s=projects.find(p=>p.id===siteId);if(!s){siteId=null;render();return}const siteBal=getSiteOnlyBalance(siteId);const vendorBalances=vendors.map(v=>({vendor:v,balance:getBalance(siteId,v.id)})).filter(x=>x.balance!==0);const vendorBal=vendorBalances.reduce((s,x)=>s+x.balance,0);const tx=transactions.filter(t=>t.project_id===siteId).sort((a,b)=>new Date(b.date)-new Date(a.date));const txWithBal=getRunningBalances([...tx].reverse());document.getElementById('content').innerHTML=`<button class="btn" onclick="siteId=null;render()" style="margin-bottom:16px">← Back</button><div class="detail-header"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px"><div><h2>🏗️ ${s.name}</h2><p style="color:#6183a0;font-size:.7rem">📍 ${s.location} | 📅 ${fmtDate(s.start_date)}</p></div><div style="display:flex;gap:12px;flex-wrap:wrap"><div class="bal-box"><div class="bal-label">Site Balance</div><div class="bal-val">${fmtBal(siteBal)}</div></div><div class="bal-box"><div class="bal-label">Vendor Balance</div><div class="bal-val">${fmtBal(vendorBal)}</div></div></div></div></div><div class="flex-row"><button class="btn btn-green" onclick="txnModal(null,null,'${s.id}')">➕ Transaction</button><button class="btn btn-red btn-sm" onclick="exportSitePDF('${s.id}')">📄 PDF</button></div>${vendorBalances.length?`<div class="bal-section"><div class="flex-row"><h3>💰 Balance by Vendor</h3><button class="btn btn-balance btn-sm" onclick="exportVendorWiseBalance('${s.id}')">📄 Download PDF</button></div>${vendorBalances.map(x=>`<div class="bal-row" onclick="vendorId='${x.vendor.id}';render()"><span>🚛 ${x.vendor.name} <small style="color:#6183a0">${x.vendor.service||''}</small></span><span>${fmtBal(x.balance)}</span></div>`).join('')}</div>`:''}<h3 style="font-size:.8rem;margin-bottom:8px">📋 Transactions</h3><div style="overflow-x:auto;background:#fff;border-radius:12px"><table><thead><tr><th>Date</th><th>Type</th><th>Credit</th><th>Debit</th><th>Vendor</th><th>Bill No.</th><th>Notes</th><th style="text-align:right">Balance</th><th>Actions</th></tr></thead><tbody>${txWithBal.length?txWithBal.map(t=>`<tr><td>${fmtDate(t.date)}</td><td><span class="badge ${t.type==='credit'?'badge-c':'badge-d'}">${t.type}</span></td><td style="text-align:right">${t.type==='credit'?fmt(t.amount):'-'}</td><td style="text-align:right">${t.type==='debit'?fmt(t.amount):'-'}</td><td>${t.vendor_id?vendors.find(v=>v.id===t.vendor_id)?.name:'-'}</td><td>${t.bill_no||'-'}</td><td>${t.notes||'-'}</td><td style="text-align:right">${fmtBal(t.runningBalance)}</td><td class="action-icons"><i class="fas fa-edit" onclick="event.stopPropagation();txnModal('${t.id}')"></i><i class="fas fa-trash-alt" onclick="event.stopPropagation();delTxn('${t.id}')"></i>${t.type==='credit'?`<button class="btn-receipt" onclick="event.stopPropagation();showReceiptForTxn('${t.id}')">🧾</button>`:''}</td></tr>`).join('')+`<tr style="background:#f8fafd;font-weight:700;border-top:2px solid #1e5f7a"><td colspan="2">Final Balance</td><td colspan="6" style="text-align:right">${fmtBal(siteBal)}</td><td></td></tr>`:'<tr><td colspan="9" style="text-align:center;padding:30px">No transactions</td></tr>'}</tbody></table></div>`}
function exportSitePDF(id){const s=projects.find(p=>p.id===id);if(!s)return;const tx=transactions.filter(t=>t.project_id===id).sort((a,b)=>new Date(b.date)-new Date(a.date));const txWithBal=getRunningBalances([...tx].reverse());const cr=tx.filter(t=>t.type==='credit').reduce((a,b)=>a+Number(b.amount),0),db=tx.filter(t=>t.type==='debit').reduce((a,b)=>a+Number(b.amount),0);exportPDF(s.name,['Date','Type','Credit ₹','Debit ₹','Vendor','Bill No.','Notes','Balance ₹'],txWithBal.map(t=>[fmtDate(t.date),t.type.toUpperCase(),t.type==='credit'?Number(t.amount).toLocaleString('en-IN'):'-',t.type==='debit'?Number(t.amount).toLocaleString('en-IN'):'-',t.vendor_id?vendors.find(v=>v.id===t.vendor_id)?.name:'-',t.bill_no||'-',t.notes||'-',Number(t.runningBalance).toLocaleString('en-IN')]),makeSummary([{label:'Credit',value:fmt(cr)},{label:'Debit',value:fmt(db)},{label:'Balance',value:fmt(cr-db)}]),`${s.name}.pdf`)}
function exportVendorWiseBalance(siteId){const s=projects.find(p=>p.id===siteId);if(!s)return;const vb=vendors.map(v=>({vendor:v,balance:getBalance(siteId,v.id)})).filter(x=>x.balance!==0);if(!vb.length){toast('No balances');return}const rows=vb.map(x=>[x.vendor.name,x.vendor.service||'-',Number(x.balance).toLocaleString('en-IN')]);const t=vb.reduce((s,x)=>s+x.balance,0);rows.push(['','TOTAL',Number(t).toLocaleString('en-IN')]);exportPDF(`${s.name} - Vendor Balance`,['Vendor','Service','Balance ₹'],rows,makeSummary([{label:'Site',value:s.name},{label:'Total',value:fmt(t)}]),`${s.name}_VendorBalance.pdf`)}
function renderVendors(){document.getElementById('content').innerHTML=`<h2 style="margin-bottom:16px">🚛 Vendors</h2><div class="flex-row"><button class="btn" onclick="addVendorModal()">➕ Add Vendor</button></div><div style="display:flex;flex-direction:column;gap:12px">${vendors.map(v=>{const bal=getVendorTotalBalance(v.id);return`<div class="item-card" onclick="vendorId='${v.id}';render()"><div class="item-header"><span class="item-name">🚛 ${v.name}</span><span class="item-qty" style="color:${bal>=0?'#16a34a':'#dc2626'}">${fmt(bal)}</span></div><div style="font-size:.7rem;color:#6183a0">${v.service||'Supplier'} | 📞 ${v.phone}</div></div>`}).join('')||'<div style="text-align:center;padding:40px">No vendors</div>'}</div>`}

it</th><th>Site</th><th>Bill No.</th><th>Notes</th><th style="text-align:right">Balance</th><th>Actions</th></tr></thead><tbody>${txWithBal.length?txWithBal.map(t=>`<tr><td>${fmtDate(t.date)}</td><td><span class="badge ${t.type==='credit'?'badge-c':'badge-d'}">${t.type}</span></td><td style="text-align:right">${t.type==='credit'?fmt(t.amount):'-'}</td><td style="text-align:right">${t.type==='debit'?fmt(t.amount):'-'}</td><td>${t.project_id?projects.find(p=>p.id===t.project_id)?.name:'-'}</td><td>${t.bill_no||'-'}</td><td>${t.notes||'-'}</td><td style="text-align:right">${fmtBal(t.runningBalance)}</td><td class="action-icons"><i class="fas fa-edit" onclick="event.stopPropagation();txnModal('${t.id}')"></i><i class="fas fa-trash-alt" onclick="event.stopPropagation();delTxn('${t.id}')"></i>${t.type==='credit'?`<button class="btn-receipt" onclick="event.stopPropagation();showReceiptForTxn('${t.id}')">🧾</button>`:''}</td></tr>`).join('')+`<tr style="background:#f8fafd;font-weight:700;border-top:2px solid #1e5f7a"><td colspan="2">Final Balance</td><td colspan="6" style="text-align:right">${fmtBal(bal)}</td><td></td></tr>`:'<tr><td colspan="9" style="text-align:center;padding:30px">No transactions</td></tr>'}</tbody></table></div>`}

function renderTransactions(){const f=getFilteredTxns().sort((a,b)=>new Date(b.date)-new Date(a.date));const txWithBal=getRunningBalances([...f].reverse());const cr=f.filter(t=>t.type==='credit').reduce((a,b)=>a+Number(b.amount),0),db=f.filter(t=>t.type==='debit').reduce((a,b)=>a+Number(b.amount),0);const siteOpts=projects.map(p=>`<option value="${p.id}" ${txnFilter.projectId===p.id?'selected':''}>${p.name}</option>`).join('');const vendOpts=vendors.map(v=>`<option value="${v.id}" ${txnFilter.vendorId===v.id?'selected':''}>${v.name}</option>`).join('');document.getElementById('content').innerHTML=`<h2 style="margin-bottom:16px">💳 All Transactions</h2><div class="filter-bar"><input type="date" value="${txnFilter.startDate}" onchange="txnFilter.startDate=this.value;render()"><input type="date" value="${txnFilter.endDate}" onchange="txnFilter.endDate=this.value;render()"><select onchange="txnFilter.projectId=this.value;render()"><option value="">All Sites</option>${siteOpts}</select><select onchange="txnFilter.vendorId=this.value;render()"><option value="">All Vendors</option>${vendOpts}</select><select onchange="txnFilter.type=this.value;render()"><option value="">All Types</option><option value="credit" ${txnFilter.type==='credit'?'selected':''}>Credit</option><option value="debit" ${txnFilter.type==='debit'?'selected':''}>Debit</option></select><input type="text" placeholder="🔍 Search" value="${txnFilter.keyword}" oninput="txnFilter.keyword=this.value;render()"><button class="btn btn-sm" onclick="txnFilter={startDate:'',endDate:'',projectId:'',vendorId:'',type:'',keyword:''};render()">Reset</button></div><div class="flex-row"><button class="btn btn-green" onclick="txnModal()">➕ Add</button><button class="btn btn-red btn-sm" onclick="exportTxnPDF()">📄 PDF</button></div><div style="overflow-x:auto;background:#fff;border-radius:12px"><table><thead><tr><th>Date</th><th>Type</th><th>Credit</th><th>Debit</th><th>Site</th><th>Vendor</th><th>Bill No.</th><th>Notes</th><th style="text-align:right">Balance</th><th>Actions</th></tr></thead><tbody>${txWithBal.length?txWithBal.map(t=>`<tr><td>${fmtDate(t.date)}</td><td><span class="badge ${t.type==='credit'?'badge-c':'badge-d'}">${t.type}</span></td><td style="text-align:right">${t.type==='credit'?fmt(t.amount):'-'}</td><td style="text-align:right">${t.type==='debit'?fmt(t.amount):'-'}</td><td>${t.project_id?projects.find(p=>p.id===t.project_id)?.name:'-'}</td><td>${t.vendor_id?vendors.find(v=>v.id===t.vendor_id)?.name:'-'}</td><td>${t.bill_no||'-'}</td><td>${t.notes||'-'}</td><td style="text-align:right">${fmtBal(t.runningBalance)}</td><td class="action-icons"><i class="fas fa-edit" onclick="event.stopPropagation();txnModal('${t.id}')"></i><i class="fas fa-trash-alt" onclick="event.stopPropagation();delTxn('${t.id}')"></i>${t.type==='credit'?`<button class="btn-receipt" onclick="event.stopPropagation();showReceiptForTxn('${t.id}')">🧾</button>`:''}</td></tr>`).join('')+`<tr style="background:#f8fafd;font-weight:700;border-top:2px solid #1e5f7a"><td colspan="2">Net Balance</td><td colspan="7" style="text-align:right">${fmtBal(cr-db)}</td><td></td></tr>`:'<tr><td colspan="10" style="text-align:center;padding:30px">No transactions</td></tr>'}</tbody></table></div>`}
function exportTxnPDF(){const f=getFilteredTxns().sort((a,b)=>new Date(b.date)-new Date(a.date));const txWithBal=getRunningBalances([...f].reverse());const cr=f.filter(t=>t.type==='credit').reduce((a,b)=>a+Number(b.amount),0),db=f.filter(t=>t.type==='debit').reduce((a,b)=>a+Number(b.amount),0);exportPDF('Transaction Report',['Date','Type','Credit ₹','Debit ₹','Site','Vendor','Bill No.','Notes','Balance ₹'],txWithBal.map(t=>[fmtDate(t.date),t.type.toUpperCase(),t.type==='credit'?Number(t.amount).toLocaleString('en-IN'):'-',t.type==='debit'?Number(t.amount).toLocaleString('en-IN'):'-',t.project_id?projects.find(p=>p.id===t.project_id)?.name:'-',t.vendor_id?vendors.find(v=>v.id===t.vendor_id)?.name:'-',t.bill_no||'-',t.notes||'-',Number(t.runningBalance).toLocaleString('en-IN')]),makeSummary([{label:'Credit',value:fmt(cr)},{label:'Debit',value:fmt(db)},{label:'Balance',value:fmt(cr-db)}]),'Transactions.pdf')}
function renderInventory(){const ui=getUniqueItems();let fl=ui;if(invTab==='low')fl=ui.filter(n=>getTotalStock(n)<=20&&getTotalStock(n)>0);if(invTab==='out')fl=ui.filter(n=>getTotalStock(n)===0);if(invFilter.keyword)fl=fl.filter(n=>n.toLowerCase().includes(invFilter.keyword.toLowerCase()));document.getElementById('content').innerHTML=`<h2 style="margin-bottom:16px">📦 Inventory</h2><div class="flex-row"><div class="tabs"><button class="tab-btn ${invTab==='all'?'active':''}" onclick="invTab='all';render()">All (${ui.length})</button><button class="tab-btn ${invTab==='low'?'active':''}" onclick="invTab='low';render()">⚠️ Low</button><button class="tab-btn ${invTab==='out'?'active':''}" onclick="invTab='out';render()">❌ Out (${ui.filter(n=>getTotalStock(n)===0).length})</button></div><button class="btn btn-green btn-sm" onclick="invModal()">➕ Add</button></div><div class="filter-bar"><input type="text" placeholder="🔍 Search" value="${invFilter.keyword}" oninput="invFilter.keyword=this.value;render()"><select onchange="invFilter.location=this.value;render()"><option value="">📍 All Locations</option>${myLocations.map(s=>`<option>${s}</option>`).join('')}</select></div><div style="display:flex;flex-direction:column;gap:12px">${fl.length?fl.map(name=>{const t=getTotalStock(name),l=getItemLocs(name),sc=t===0?'#dc2626':t<=20?'#f59e0b':'#16a34a';return`<div class="item-card" onclick="showItemDetail('${name}')"><div class="item-header"><span class="item-name">📦 ${name}</span><span class="item-qty" style="color:${sc};border:2px solid ${sc}">${t===0?'❌ OUT OF STOCK':fmtNum(t)+' units'}</span></div><div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px">${l.map(lc=>{const s=getStockAt(name,lc);return`<span class="loc-chip ${s===0?'empty':''}" onclick="event.stopPropagation();showLocDetail('${lc}')">📍 ${lc}: ${s===0?'0':fmtNum(s)}</span>`}).join('')}</div></div>`}).join(''):'<div style="text-align:center;padding:40px">No items</div>'}</div>`}
function showItemDetail(name){selItem=name;const l=getItemLocs(name),t=getTotalStock(name),m=getMovements(name);document.getElementById('content').innerHTML=`<button class="btn" onclick="selItem=null;render()" style="margin-bottom:16px">← Back</button><div class="detail-header"><div class="detail-inner"><div><h2>📦 ${name}</h2><p style="color:#6183a0">${l.length} locations | ${m.length} movements</p></div><div class="bal-box"><div class="bal-label">Total Stock</div><div class="bal-val" style="color:${t===0?'#dc2626':t<=20?'#f59e0b':'#16a34a'}">${t===0?'❌ OUT':fmtNum(t)}</div></div></div></div>${t===0?`<div class="stock-info danger">⚠️ <b>OUT OF STOCK</b></div>`:''}<div class="flex-row"><div style="display:flex;gap:6px"><button class="btn btn-sm btn-green" onclick="invModal('${name}','stock')">➕ Add</button><button class="btn btn-sm btn-red" onclick="invModal('${name}','use')">➖ Use</button><button class="btn btn-sm btn-orange" onclick="invModal('${name}','transfer')">🚛 Move</button></div></div><div class="cards">${l.map(lc=>{const s=getStockAt(name,lc);return`<div class="card" onclick="showLocDetail('${lc}')"><div class="card-title">📍 ${lc}</div><div class="card-value" style="font-size:1.2rem">${s===0?'0':fmtNum(s)}</div></div>`}).join('')}</div><h3 style="margin:16px 0 10px">📋 Movement History</h3><div style="overflow-x:auto;background:#fff;border-radius:12px"><table><thead><tr><th>Date</th><th>Type</th><th>Qty</th><th>From</th><th>To</th></tr></thead><tbody>${m.map(x=>`<tr><td>${fmtDate(x.date)}</td><td><span class="badge ${x.type==='add'?'badge-in':x.type==='use'?'badge-out':'badge-transfer'}">${x.type}</span></td><td>${x.quantity}</td><td>${x.from_location||'-'}</td><td>${x.to_location||'-'}</td></tr>`).join('')}</tbody></table></div>`}
function showLocDetail(loc){selLoc=loc;const it=invItems.filter(i=>i.location===loc);document.getElementById('content').innerHTML=`<button class="btn" onclick="selLoc=null;render()" style="margin-bottom:16px">← Back</button><div class="detail-header"><h2>📍 ${loc}</h2><p style="color:#6183a0">${it.length} items | ${fmtNum(it.reduce((s,i)=>s+i.quantity,0))} units</p></div><div class="cards">${it.map(i=>`<div class="card" onclick="showItemDetail('${i.name}')"><div class="card-title">📦 ${i.name}</div><div class="card-value" style="font-size:1.2rem">${fmtNum(i.quantity)} ${i.unit}</div></div>`).join('')}</div>`}

document.querySelectorAll('#mainApp .nav-link').forEach(l=>{l.addEventListener('click',()=>{currentView=l.dataset.view;siteId=null;vendorId=null;selItem=null;selLoc=null;document.querySelectorAll('#mainApp .nav-link').forEach(x=>x.classList.remove('active'));l.classList.add('active');render()})});
async function init(){checkBiometricSupport();if(isSessionValid()){const{data:{session}}=await sb.auth.getSession();if(session){document.getElementById('loginScreen').style.display='none';document.getElementById('mainApp').style.display='block';await loadData();render()}}}
init();
</script>
</body>
